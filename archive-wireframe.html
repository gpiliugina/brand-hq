/* ── Circle-pack engine ── */
function createPackEngine(opts) {
  let circles = [];
  let growing = [];
  let W = 0, H = 0;
  let grid = null;
  let cellSize = 64;

  function resize(w, h) {
    W = w; H = h;
    circles = []; growing = [];
    rebuildGrid();
  }

  function rebuildGrid() {
    cellSize = Math.max(32, opts.maxRadius() * 1.0);
    const cols = Math.ceil(W / cellSize) + 1;
    const rows = Math.ceil(H / cellSize) + 1;
    grid = { cols, rows, cells: new Array(cols * rows) };
    for (let i = 0; i < grid.cells.length; i++) grid.cells[i] = [];
    for (let i = 0; i < circles.length; i++) gridInsert(i);
  }

  function gridKey(x, y) {
    const cx = Math.max(0, Math.min(grid.cols - 1, Math.floor(x / cellSize)));
    const cy = Math.max(0, Math.min(grid.rows - 1, Math.floor(y / cellSize)));
    return cy * grid.cols + cx;
  }
  function gridInsert(idx) {
    const c = circles[idx];
    grid.cells[gridKey(c.x, c.y)].push(idx);
  }
  function gridNeighbors(x, y, r) {
    const minCx = Math.max(0, Math.floor((x - r) / cellSize));
    const maxCx = Math.min(grid.cols - 1, Math.floor((x + r) / cellSize));
    const minCy = Math.max(0, Math.floor((y - r) / cellSize));
    const maxCy = Math.min(grid.rows - 1, Math.floor((y + r) / cellSize));
    const out = [];
    for (let cy = minCy; cy <= maxCy; cy++) {
      for (let cx = minCx; cx <= maxCx; cx++) {
        const arr = grid.cells[cy * grid.cols + cx];
        for (let i = 0; i < arr.length; i++) out.push(arr[i]);
      }
    }
    return out;
  }

  function trySpawn(attempts = 40) {
    const minR = opts.minRadius();
    const maxR = opts.maxRadius();
    for (let a = 0; a < attempts; a++) {
      const x = Math.random() * W;
      const y = Math.random() * H;
      const cand = gridNeighbors(x, y, maxR);
      let nearest = Infinity;
      for (let i = 0; i < cand.length; i++) {
        const c = circles[cand[i]];
        const dx = c.x - x, dy = c.y - y;
        const d = Math.sqrt(dx * dx + dy * dy) - c.r;
        if (d < nearest) nearest = d;
      }
      const edge = Math.min(x, y, W - x, H - y);
      if (edge < nearest) nearest = edge;
      if (nearest < minR + 0.5) continue;
      const target = Math.min(maxR, nearest - 0.5);
      const c = {
        x, y, r: 0.1,
        target,
        settled: false,
        phase: Math.random() * Math.PI * 2,
        seed: Math.random(),
        widgetKey: null,
        assigned: false,
      };
      const idx = circles.length;
      circles.push(c);
      growing.push(idx);
      gridInsert(idx);
      return idx;
    }
    return -1;
  }

  function step(dt) {
    const speed = opts.growSpeed();
    for (let k = growing.length - 1; k >= 0; k--) {
      const idx = growing[k];
      const c = circles[idx];
      if (c.settled) { growing.splice(k, 1); continue; }
      const grow = speed * (1 + Math.max(0, 6 - c.r) * 0.25) * dt * 60;
      let newR = c.r + grow;
      if (newR >= c.target) { newR = c.target; c.settled = true; }
      const cand = gridNeighbors(c.x, c.y, newR + 4);
      for (let i = 0; i < cand.length; i++) {
        const j = cand[i];
        if (j === idx) continue;
        const o = circles[j];
        const dx = o.x - c.x, dy = o.y - c.y;
        const d = Math.sqrt(dx * dx + dy * dy) - o.r;
        if (d < newR) { newR = d; c.settled = true; }
      }
      const edge = Math.min(c.x, c.y, W - c.x, H - c.y);
      if (edge < newR) { newR = edge; c.settled = true; }
      c.r = Math.max(0, newR);
      if (c.settled) growing.splice(k, 1);
    }
    const rate = opts.spawnRate();
    for (let i = 0; i < rate; i++) {
      if (growing.length > 0) break;
      trySpawn();
    }
  }

  function getCircles() { return circles; }
  function clear() { circles = []; growing = []; rebuildGrid(); }

  return { resize, step, getCircles, clear };
}

function packMix(a, b, t) {
  const pa = packHex(a), pb = packHex(b);
  const r = Math.round(pa[0] + (pb[0] - pa[0]) * t);
  const g = Math.round(pa[1] + (pb[1] - pa[1]) * t);
  const bl = Math.round(pa[2] + (pb[2] - pa[2]) * t);
  return `rgb(${r},${g},${bl})`;
}
function packHex(h) {
  const s = h.replace("#", "");
  return s.length === 3
    ? s.split("").map(c => parseInt(c + c, 16))
    : [parseInt(s.slice(0,2),16), parseInt(s.slice(2,4),16), parseInt(s.slice(4,6),16)];
}

function BubblePicker({ availableWidgets, onAdd, onClose }) {
  const { theme } = useContext(AppContext);
  const [closing, setClosing] = useState(false);
  const [circles, setCircles] = useState([]);
  const [hovered, setHovered] = useState(-1);
  const widgets = availableWidgets || [];

  const BG     = theme === "dark" ? "#1C1C1E" : "#ECEDEF";
  const INK    = theme === "dark" ? "rgba(240,237,232,0.88)" : "rgba(20,20,20,0.88)";
  const STROKE = theme === "dark" ? "rgba(255,255,255,0.14)" : "rgba(20,20,20,0.18)";

  function handleClose() {
    setClosing(true);
    setTimeout(() => onClose(), 300);
  }

  useEffect(() => {
    function onKey(e) { if (e.key === "Escape") handleClose(); }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  useEffect(() => {
    const W = window.innerWidth;
    const H = window.innerHeight;
    const engine = createPackEngine({
      maxRadius: () => Math.min(260, Math.min(W, H) * 0.28),
      minRadius: () => 56,
      growSpeed: () => 8,
      spawnRate: () => 1,
    });
    engine.resize(W, H);
    // Run synchronously to stable layout — no RAF dependency
    for (let i = 0; i < 6000; i++) engine.step(1 / 60);
    const raw = engine.getCircles().filter(c => c.settled && c.r >= 56);
    // Sort largest-first so big circles get widgets assigned
    raw.sort((a, b) => b.r - a.r);
    const mapped = widgets.slice(0, raw.length).map((key, i) => ({
      key,
      x: raw[i].x,
      y: raw[i].y,
      r: raw[i].r,
    }));
    setCircles(mapped);
  }, [widgets.join(",")]);

  return (
    <div
      onClick={handleClose}
      style={{
        position: "fixed", inset: 0, zIndex: 500,
        background: BG,
        opacity: closing ? 0 : 1,
        transition: "opacity 0.3s ease",
      }}
    >
      {circles.map((c, i) => {
        const label = WIDGET_CATALOGUE[c.key]?.title || c.key;
        const fontSize = c.r > 170 ? 28 : c.r > 120 ? 22 : c.r > 88 ? 18 : 14;
        const words = label.split(" ");
        const isHov = hovered === i;
        return (
          <div
            key={c.key}
            onClick={e => { e.stopPropagation(); onAdd(c.key); onClose(); }}
            onMouseEnter={() => setHovered(i)}
            onMouseLeave={() => setHovered(-1)}
            style={{
              position: "absolute",
              left: c.x - c.r,
              top: c.y - c.r,
              width: c.r * 2,
              height: c.r * 2,
              borderRadius: "50%",
              border: `1px solid ${STROKE}`,
              background: "transparent",
              boxShadow: isHov ? "inset 0 0 60px 18px rgba(232,254,103,0.22)" : "none",
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              justifyContent: "center",
              cursor: "pointer",
              animation: `bubbleIn 0.5s cubic-bezier(0.34,1.56,0.64,1) ${i * 0.055}s both`,
              transform: isHov ? "scale(1.05)" : "scale(1)",
              transition: "transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease",
            }}
          >
            {words.length > 1 ? (
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2, pointerEvents: "none" }}>
                {words.map((w, wi) => (
                  <span key={wi} style={{
                    fontFamily: "'Libre Caslon Display', Georgia, serif",
                    fontSize,
                    fontWeight: 400,
                    color: INK,
                    lineHeight: 1.15,
                    textAlign: "center",
                    display: "block",
                  }}>{w}</span>
                ))}
              </div>
            ) : (
              <span style={{
                fontFamily: "'Libre Caslon Display', Georgia, serif",
                fontSize,
                fontWeight: 400,
                color: INK,
                pointerEvents: "none",
              }}>{label}</span>
            )}
          </div>
        );
      })}

      <button
        onClick={e => { e.stopPropagation(); handleClose(); }}
        style={{
          position: "absolute", top: 24, right: 24,
          width: 40, height: 40, borderRadius: "50%",
          background: theme === "dark" ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.06)",
          border: "none", cursor: "pointer",
          fontSize: 18,
          color: theme === "dark" ? "rgba(255,255,255,0.6)" : "rgba(0,0,0,0.5)",
          display: "flex", alignItems: "center", justifyContent: "center",
          zIndex: 10,
          transition: "background 0.15s",
        }}
        onMouseEnter={e => e.currentTarget.style.background = theme === "dark" ? "rgba(255,255,255,0.14)" : "rgba(0,0,0,0.10)"}
        onMouseLeave={e => e.currentTarget.style.background = theme === "dark" ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.06)"}
      >×</button>

      <div style={{
        position: "absolute", bottom: 24, left: "50%",
        transform: "translateX(-50%)",
        fontSize: 11, letterSpacing: "0.18em",
        textTransform: "uppercase",
        color: theme === "dark" ? "rgba(255,255,255,0.28)" : "rgba(0,0,0,0.28)",
        pointerEvents: "none",
        fontFamily: "'Inter', sans-serif",
      }}>Click a circle to add · Esc to close</div>
    </div>
  );
}

function ScreenHome({ role, go }) {
  const { userName } = useContext(AppContext);
  const startingWidgets = (role && ROLE_PRESETS[role]) ? ROLE_PRESETS[role] : ROLE_PRESETS.designer;

  const [widgets, setWidgetsState] = useState(() => {
    try {
      const saved = localStorage.getItem("archive-home-widgets");
      if (saved) {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed)) {
          return parsed.filter(k => WIDGET_CATALOGUE[k]);
        }
      }
    } catch (_) {}
    return startingWidgets;
  });

  function persist(next) {
    try { localStorage.setItem("archive-home-widgets", JSON.stringify(next)); } catch (_) {}
  }
  function setWidgets(updater) {
    setWidgetsState(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      persist(next);
      return next;
    });
  }

  // ---- Drag state ----
  const [draggedKey, setDraggedKey] = useState(null);
  const [dragInfo, setDragInfo] = useState(null);
  const [mousePos, setMousePos] = useState(null);
  const [outsideGrid, setOutsideGrid] = useState(false);
  const gridRef = useRef(null);
  const ghostSlotRef = useRef(null);

  function onWidgetDragStart(key, rect, mouseX, mouseY) {
    setDraggedKey(key);
    setDragInfo({
      width: rect.width,
      height: rect.height,
      offsetX: mouseX - rect.left,
      offsetY: mouseY - rect.top,
    });
    setMousePos({ x: mouseX, y: mouseY });
    setOutsideGrid(false);
  }

  useEffect(() => {
    if (!draggedKey) return;

    function pointerInsideGrid(px, py) {
      const r = gridRef.current && gridRef.current.getBoundingClientRect();
      if (!r) return false;
      return px >= r.left && px <= r.right && py >= r.top && py <= r.bottom;
    }

    function onMove(ev) {
      setMousePos({ x: ev.clientX, y: ev.clientY });
      const inside = pointerInsideGrid(ev.clientX, ev.clientY);
      setOutsideGrid(!inside);

      if (inside) {
        const els = document.elementsFromPoint(ev.clientX, ev.clientY);
        for (const el of els) {
          const tk = el.dataset && el.dataset.widgetKey;
          if (tk && tk !== draggedKey) {
            setWidgetsState(prev => {
              const fromIdx = prev.indexOf(draggedKey);
              const toIdx = prev.indexOf(tk);
              if (fromIdx < 0 || toIdx < 0 || fromIdx === toIdx) return prev;
              const next = [...prev];
              [next[fromIdx], next[toIdx]] = [next[toIdx], next[fromIdx]];
              persist(next);
              return next;
            });
            break;
          }
        }
      }
    }

    function onUp(ev) {
      const inside = pointerInsideGrid(ev.clientX, ev.clientY);
      if (!inside) {
        setWidgets(arr => arr.filter(w => w !== draggedKey));
      }
      setDraggedKey(null);
      setDragInfo(null);
      setMousePos(null);
      setOutsideGrid(false);
    }

    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
    return () => {
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
    };
  }, [draggedKey]);

  // ---- Picker state ----
  const [pickerOpen, setPickerOpen] = useState(false);
  const [justAddedKey, setJustAddedKey] = useState(null);

  function openPicker() {
    setPickerOpen(true);
  }
  function addWidget(key) {
    setWidgets(arr => arr.includes(key) ? arr : [...arr, key]);
    setPickerOpen(false);
    setJustAddedKey(key);
    setTimeout(() => setJustAddedKey(k => (k === key ? null : k)), 700);
  }

  const availableToAdd = Object.keys(WIDGET_CATALOGUE).filter(k => !widgets.includes(k));

  // ---- Search state ----
  const [searchFocused, setSearchFocused] = useState(false);
  const [searchQuery, setSearchQuery] = useState("");
  const searchResults = searchTools(searchQuery);

  const draggedWidget = draggedKey ? WIDGET_CATALOGUE[draggedKey] : null;

  return (
    <Shell active="home" go={go} fullBleed>
      <div style={{
        padding: "100px 52px 72px",
        maxWidth: CONTENT_MAX, margin: "0 auto",
        position: "relative",
      }}>
        {/* Headline */}
        <h1 style={{
          fontFamily: HOME_SERIF, fontWeight: 400,
          fontSize: 80, color: "var(--ink)",
          letterSpacing: -2.5, lineHeight: 0.92,
          margin: 0, position: "relative",
          animation: "heroIn 0.7s cubic-bezier(0.22,1,0.36,1) backwards",
        }}>Welcome, <Highlight>{userName && userName.trim() ? userName.trim() : "there"}</Highlight>.</h1>

        {/* Page blur backdrop when search is active (does NOT move widgets) */}
        {searchFocused && (
          <div
            onMouseDown={() => setSearchFocused(false)}
            style={{
              position: "fixed", inset: 0, zIndex: 90,
              background: "rgba(153,163,173,0.55)",
              backdropFilter: "blur(7px)", WebkitBackdropFilter: "blur(7px)",
              transition: "backdrop-filter 0.2s ease",
            }}
          />
        )}

        {/* AI search — reserved-height wrapper so the grid never shifts */}
        <div style={{ marginTop: 32, maxWidth: 760, height: 52, position: "relative" }}>
          <div style={{
            position: "absolute", top: 0, left: 0, right: 0,
            zIndex: searchFocused ? 100 : 1,
          }}>
            <div style={{
              background: SURFACE,
              border: searchFocused ? "1px solid var(--ink)" : `1px solid var(--border)`,
              borderRadius: 14,
              padding: "12px 16px",
              transition: "border-color 0.15s",
              position: "relative",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{
                  width: 30, height: 30, borderRadius: 8,
                  background: SOLID, color: "white",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 13, fontWeight: 700, flexShrink: 0,
                }}>✦</div>
                <input
                  value={searchQuery}
                  onChange={(e) => { setSearchQuery(e.target.value); setSearchFocused(true); }}
                  onFocus={() => setSearchFocused(true)}
                  placeholder="Ask Archive — find any brand space, file or rule…"
                  style={{
                    flex: 1, border: "none", outline: "none",
                    fontSize: 15, color: DARK, background: "transparent",
                    padding: "6px 0",
                  }}
                />
                <span style={{
                  fontSize: 10, color: MUTED, letterSpacing: 0.6,
                  fontFamily: '"SF Mono", monospace',
                  padding: "4px 8px", border: `1px solid ${HOME_TILE_BORDER}`, borderRadius: 4,
                }}>⌘ K</span>
              </div>

              {/* Absolutely-positioned dropdown — doesn't affect layout flow */}
              {searchFocused && (
                <div style={{
                  position: "absolute", top: "calc(100% + 8px)", left: 0, right: 0,
                  background: SURFACE,
                  border: `1px solid var(--border)`, borderRadius: 14,
                  padding: 14,
                }}>
                  <div style={{
                    fontSize: 10, color: MUTED, letterSpacing: 0.8,
                    textTransform: "uppercase", fontWeight: 600, marginBottom: 8,
                  }}>
                    {searchQuery.trim()
                      ? (searchResults.length ? `${searchResults.length} ${searchResults.length === 1 ? "result" : "results"}` : "No matches")
                      : "Jump to"}
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                    {searchResults.length === 0 && (
                      <div style={{ padding: "10px 12px", fontSize: 13, color: MUTED }}>
                        Nothing matches “{searchQuery}”. Try “photo”, “logo”, “colour”…
                      </div>
                    )}
                    {searchResults.slice(0, 6).map((s, i) => (
                      <div
                        key={s.label}
                        onMouseDown={(e) => { e.preventDefault(); setSearchFocused(false); setSearchQuery(""); go(s.to); }}
                        style={{
                          padding: "10px 12px", borderRadius: 8, cursor: "pointer",
                          background: i === 0 ? "rgba(0,0,0,0.04)" : "transparent",
                          display: "flex", alignItems: "center", gap: 12,
                          animation: `tileIn 0.34s cubic-bezier(0.22,1,0.36,1) backwards`,
                          animationDelay: `${i * 35}ms`,
                        }}
                        onMouseEnter={(e) => e.currentTarget.style.background = "rgba(0,0,0,0.06)"}
                        onMouseLeave={(e) => e.currentTarget.style.background = i === 0 ? "rgba(0,0,0,0.04)" : "transparent"}
                      >
                        <span style={{
                          width: 26, height: 26, borderRadius: 13, flexShrink: 0,
                          background: "var(--ph-2)", color: DARK,
                          display: "flex", alignItems: "center", justifyContent: "center",
                          fontFamily: HOME_SERIF, fontSize: 14,
                        }}>{s.label.charAt(0)}</span>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 13, color: DARK, fontWeight: 500 }}>{s.label}</div>
                          <div style={{ fontSize: 11, color: MUTED, marginTop: 1 }}>{s.hint}</div>
                        </div>
                        <span style={{ color: MUTED, fontSize: 12 }}>↗</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>

        {/* Widget grid */}
        <div
          ref={gridRef}
          style={{
            marginTop: 40,
            display: "grid",
            gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))",
            gap: 20,
            position: "relative", zIndex: 1,
            transition: "opacity 0.25s ease",
            opacity: pickerOpen ? 0.15 : 1,
            pointerEvents: pickerOpen ? "none" : "auto",
          }}
        >
          {widgets.map((key, idx) => {
            const w = WIDGET_CATALOGUE[key];
            if (!w) return null;
            return (
              <HomeWidgetTile
                key={key}
                widgetKey={key}
                widget={w}
                go={go}
                index={idx}
                justAdded={justAddedKey === key}
                isDragged={draggedKey === key}
                isAnyDragging={!!draggedKey}
                onDragStart={onWidgetDragStart}
              />
            );
          })}

          {/* Ghost slot */}
          <button
            ref={ghostSlotRef}
            onClick={openPicker}
            style={{
              height: 260, borderRadius: 14,
              border: `1px dashed var(--border)`,
              background: "transparent",
              color: "var(--muted)", fontSize: 12, cursor: "pointer",
              display: "flex", flexDirection: "column",
              alignItems: "center", justifyContent: "center", gap: 12,
              transition: "border-color 0.15s, background 0.15s, color 0.15s",
              fontFamily: "inherit",
            }}
            onMouseEnter={(e) => {
              e.currentTarget.style.borderColor = "var(--ink)";
              e.currentTarget.style.color = "var(--ink)";
              e.currentTarget.style.background = "var(--faint)";
            }}
            onMouseLeave={(e) => {
              e.currentTarget.style.borderColor = "var(--border)";
              e.currentTarget.style.color = "var(--muted)";
              e.currentTarget.style.background = "transparent";
            }}
          >
            <div style={{
              width: 46, height: 46, borderRadius: 23,
              border: `1.5px solid currentColor`,
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 22, fontWeight: 300,
            }}>+</div>
            <span style={{ letterSpacing: 0.4, fontFamily: HOME_SERIF, fontSize: 14 }}>Add widget</span>
          </button>
        </div>
      </div>

      {/* Floating dragged ghost */}
      {draggedKey && draggedWidget && mousePos && dragInfo && (
        <div style={{
          position: "fixed",
          left: mousePos.x - dragInfo.offsetX,
          top: mousePos.y - dragInfo.offsetY,
          width: dragInfo.width, height: dragInfo.height,
          background: SURFACE,
          border: outsideGrid ? "2px solid rgba(192,60,60,0.55)" : `1px solid var(--ink)`,
          borderRadius: 14,
          padding: 20,
          pointerEvents: "none",
          zIndex: 200,
          transform: "scale(1.04)",
          transformOrigin: "center",
          display: "flex", flexDirection: "column",
          transition: "box-shadow 0.15s, border-color 0.15s",
        }}>
          <div style={{
            fontSize: 14, fontWeight: 600, color: DARK,
            letterSpacing: -0.1, marginBottom: 14,
          }}>{draggedWidget.title}</div>
          <div style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column" }}>
            {draggedWidget.render(go)}
          </div>
        </div>
      )}

      {/* Outside-grid removal tooltip */}
      {draggedKey && outsideGrid && mousePos && (
        <div style={{
          position: "fixed",
          left: mousePos.x + 18, top: mousePos.y + 18,
          background: SURFACE,
          border: "1px solid rgba(192,60,60,0.4)",
          color: "#a04040",
          padding: "6px 12px",
          borderRadius: 14,
          fontSize: 11, fontWeight: 500, letterSpacing: 0.2,
          pointerEvents: "none", zIndex: 300,
        }}>Release to remove</div>
      )}

      {/* Bubble picker */}
      {pickerOpen && (
        <BubblePicker
          availableWidgets={availableToAdd}
          onAdd={addWidget}
          onClose={() => setPickerOpen(false)}
        />
      )}
    </Shell>
  );
}

// =============== ROUTER ===============
function App() {
  const [screen, setScreen] = useState("role");
  const [role, setRole] = useState(null);
  const [userName, setUserName] = useState("");
  const [openTabs, setOpenTabs] = useState([]);
  // Dark theme removed — app is light-only
  const theme = "light";
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", "light");
  }, []);
  function toggleTheme() {}

  const go = (s) => {
    setScreen(s);
    window.scrollTo(0, 0);
    const tool = toolForScreen(s);
    if (tool) setOpenTabs(prev => prev.includes(tool) ? prev : [...prev, tool]);
  };

  function closeTab(toolKey) {
    setOpenTabs(prev => {
      const next = prev.filter(t => t !== toolKey);
      const curTool = toolForScreen(screen);
      if (curTool === toolKey) {
        if (next.length > 0) {
          const target = TOOLS.find(t => t.key === next[next.length - 1]);
          setScreen(target ? target.to : "home");
        } else {
          setScreen("home");
        }
        window.scrollTo(0, 0);
      }
      return next;
    });
  }

  function chooseRole(r) {
    setRole(r);
    go("home");
  }
  function changeRole() { go("role"); }
  function resetOnboarding() {
    try {
      localStorage.removeItem("archive-home-widgets");
      localStorage.removeItem("archive-role");
    } catch (_) {}
    setRole(null);
    setOpenTabs([]);
    go("role");
  }

  const ctx = { role, changeRole, resetOnboarding, openTabs, closeTab, theme, toggleTheme, userName, setUserName };

  let content;
  if (screen === "role") {
    content = <ScreenRole onChoose={chooseRole} onSkip={() => go("home")} />;
  } else {
    switch (screen) {
      case "home":        content = <ScreenHome role={role} go={go} onChangeRole={changeRole} />; break;
      case "library":     content = <ScreenLibrary go={go} />; break;
      case "files":       content = <ScreenFiles go={go} />; break;
      case "photo":       content = <ScreenPhoto go={go} />; break;
      case "creator":     content = <ScreenCreator go={go} />; break;
      case "signature":   content = <ScreenSignature go={go} />; break;
      case "social":      content = <ScreenSocial go={go} />; break;
      case "onboarding":  content = <ScreenOnboarding go={go} />; break;
      case "memory":      content = <ScreenMemory go={go} />; break;
      default:            content = <ScreenHome role={role} go={go} onChangeRole={changeRole} />;
    }
  }

  return <AppContext.Provider value={ctx}>{content}</AppContext.Provider>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
