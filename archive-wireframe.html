function searchTools(q) {
  const query = q.trim().toLowerCase();
  if (!query) {
    return ["Team Photos","Photo Archive","Brand Library","Email Signature"]
      .map(l => SEARCH_INDEX.find(s => s.label === l));
  }
  return SEARCH_INDEX
    .map(s => {
      const label = s.label.toLowerCase();
      let score = 0;
      if (label === query) score = 100;
      else if (label.startsWith(query)) score = 70;
      else if (label.includes(query)) score = 50;
      else if (s.keywords.some(k => k.startsWith(query))) score = 35;
      else if (s.keywords.some(k => k.includes(query))) score = 20;
      return { s, score };
    })
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .map(x => x.s);
}

// ===== Widget tile (handles click-vs-hold discrimination) =====
function HomeWidgetTile({ widgetKey, widget, go, index = 0, justAdded, isDragged, isAnyDragging, onDragStart }) {
  const [hover, setHover] = useState(false);
  const [pressed, setPressed] = useState(false);
  const stateRef = useRef({ phase: "idle", startX: 0, startY: 0, timer: null });

  function onPointerDown(e) {
    if (e.button !== 0) return;
    if (isAnyDragging) return;
    e.preventDefault();
    setPressed(true);
    const rect = e.currentTarget.getBoundingClientRect();
    const startX = e.clientX, startY = e.clientY;
    stateRef.current = { phase: "pressed", startX, startY, timer: null };

    stateRef.current.timer = setTimeout(() => {
      if (stateRef.current.phase === "pressed") {
        stateRef.current.phase = "dragging";
        onDragStart(widgetKey, rect, startX, startY);
      }
    }, 160);

    function onMove(ev) {
      const dx = ev.clientX - stateRef.current.startX;
      const dy = ev.clientY - stateRef.current.startY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (stateRef.current.phase === "pressed" && dist > 5) {
        clearTimeout(stateRef.current.timer);
        stateRef.current.phase = "dragging";
        onDragStart(widgetKey, rect, stateRef.current.startX, stateRef.current.startY);
      }
    }

    function onUp(ev) {
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      if (stateRef.current.timer) clearTimeout(stateRef.current.timer);
      if (stateRef.current.phase === "pressed") {
        if (widget.working && widget.to) go(widget.to);
      }
      stateRef.current.phase = "idle";
      setPressed(false);
    }

    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  }

  return (
    <div
      data-widget-key={widgetKey}
      onPointerDown={onPointerDown}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        position: "relative",
        background: isDragged ? "rgba(255,255,255,0.4)" : "var(--surface)",
        border: isDragged ? `1px dashed var(--border)` : `1px solid var(--border)`,
        borderRadius: 14,
        padding: 0,
        height: 260,
        overflow: widgetKey === "files" ? "visible" : "hidden",
        display: "flex", flexDirection: "column",
        cursor: widget.working ? "pointer" : "grab",
        userSelect: "none",
        opacity: isDragged ? 0.35 : widget.working ? 1 : 0.62,
        transform: isDragged ? "translateY(0)" : hover ? "translateY(-3px)" : "translateY(0)",
        boxShadow: pressed ? "inset 0 0 0 1.5px rgba(232,254,103,0.3)" : "none",
        transition: "transform 0.2s ease, box-shadow 0.15s ease, opacity 0.15s, background 0.15s, border-color 0.15s",
        touchAction: "none",
        animation: isDragged
          ? "none"
          : justAdded
            ? `widgetAddIn 0.62s cubic-bezier(0.34,1.56,0.64,1) both`
            : `tileIn 0.5s cubic-bezier(0.22,1,0.36,1) backwards`,
        animationDelay: justAdded ? "0ms" : `${Math.min(index, 11) * 45}ms`,
      }}
      onMouseOver={e => { if (!isDragged && widget.working) e.currentTarget.style.borderColor = "var(--ink)"; }}
      onMouseOut={e => { e.currentTarget.style.borderColor = "var(--border)"; }}
    >
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        marginBottom: 16, padding: "20px 20px 0",
      }}>
        <div style={{
          fontFamily: "'Inter', sans-serif", fontSize: 13, fontWeight: 500, color: "var(--ink)",
          letterSpacing: 0, lineHeight: 1,
        }}>{widget.title}</div>
        {!widget.working && (
          <span style={{
            fontSize: 10, fontWeight: 500, letterSpacing: 0.8,
            color: "var(--ph-4)", textTransform: "uppercase",
            fontFamily: "'Inter', sans-serif",
          }}>Soon</span>
        )}
      </div>
      <div style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column" }}>
        {widget.render(go, hover)}
      </div>
    </div>
  );
}

/* ── Circle-pack engine ── */
function createPackEngine(opts) {
  let circles = [];
  let growing = [];
  let W = 0, H = 0;
  let grid = null;
  let cellSize = 64;

  function resize(w, h) {
    W = w; H = h;
    circles = []; growing = [];
    rebuildGrid();
  }

  function rebuildGrid() {
    cellSize = Math.max(32, opts.maxRadius() * 1.0);
    const cols = Math.ceil(W / cellSize) + 1;
    const rows = Math.ceil(H / cellSize) + 1;
    grid = { cols, rows, cells: new Array(cols * rows) };
    for (let i = 0; i < grid.cells.length; i++) grid.cells[i] = [];
    for (let i = 0; i < circles.length; i++) gridInsert(i);
  }

  function gridKey(x, y) {
    const cx = Math.max(0, Math.min(grid.cols - 1, Math.floor(x / cellSize)));
    const cy = Math.max(0, Math.min(grid.rows - 1, Math.floor(y / cellSize)));
    return cy * grid.cols + cx;
  }
  function gridInsert(idx) {
    const c = circles[idx];
    grid.cells[gridKey(c.x, c.y)].push(idx);
  }
  function gridNeighbors(x, y, r) {
    const minCx = Math.max(0, Math.floor((x - r) / cellSize));
    const maxCx = Math.min(grid.cols - 1, Math.floor((x + r) / cellSize));
    const minCy = Math.max(0, Math.floor((y - r) / cellSize));
    const maxCy = Math.min(grid.rows - 1, Math.floor((y + r) / cellSize));
    const out = [];
    for (let cy = minCy; cy <= maxCy; cy++) {
      for (let cx = minCx; cx <= maxCx; cx++) {
        const arr = grid.cells[cy * grid.cols + cx];
        for (let i = 0; i < arr.length; i++) out.push(arr[i]);
      }
    }
    return out;
  }

  function trySpawn(attempts = 40) {
    const minR = opts.minRadius();
    const maxR = opts.maxRadius();
    for (let a = 0; a < attempts; a++) {
      const x = Math.random() * W;
      const y = Math.random() * H;
      const cand = gridNeighbors(x, y, maxR);
      let nearest = Infinity;
      for (let i = 0; i < cand.length; i++) {
        const c = circles[cand[i]];
        const dx = c.x - x, dy = c.y - y;
        const d = Math.sqrt(dx * dx + dy * dy) - c.r;
        if (d < nearest) nearest = d;
      }
      const edge = Math.min(x, y, W - x, H - y);
      if (edge < nearest) nearest = edge;
      if (nearest < minR + 0.5) continue;
      const target = Math.min(maxR, nearest - 0.5);
      const c = {
        x, y, r: 0.1,
        target,
        settled: false,
        phase: Math.random() * Math.PI * 2,
        seed: Math.random(),
        widgetKey: null,
        assigned: false,
      };
      const idx = circles.length;
      circles.push(c);
      growing.push(idx);
      gridInsert(idx);
      return idx;
    }
    return -1;
  }

  function step(dt) {
    const speed = opts.growSpeed();
    for (let k = growing.length - 1; k >= 0; k--) {
      const idx = growing[k];
      const c = circles[idx];
      if (c.settled) { growing.splice(k, 1); continue; }
      const grow = speed * (1 + Math.max(0, 6 - c.r) * 0.25) * dt * 60;
      let newR = c.r + grow;
      if (newR >= c.target) { newR = c.target; c.settled = true; }
      const cand = gridNeighbors(c.x, c.y, newR + 4);
      for (let i = 0; i < cand.length; i++) {
        const j = cand[i];
        if (j === idx) continue;
        const o = circles[j];
        const dx = o.x - c.x, dy = o.y - c.y;
        const d = Math.sqrt(dx * dx + dy * dy) - o.r;
        if (d < newR) { newR = d; c.settled = true; }
      }
      const edge = Math.min(c.x, c.y, W - c.x, H - c.y);
      if (edge < newR) { newR = edge; c.settled = true; }
      c.r = Math.max(0, newR);
      if (c.settled) growing.splice(k, 1);
    }
    const rate = opts.spawnRate();
    for (let i = 0; i < rate; i++) {
      if (growing.length > 0) break;
      trySpawn();
    }
  }

  function getCircles() { return circles; }
  function clear() { circles = []; growing = []; rebuildGrid(); }

  return { resize, step, getCircles, clear };
}

function packMix(a, b, t) {
  const pa = packHex(a), pb = packHex(b);
  const r = Math.round(pa[0] + (pb[0] - pa[0]) * t);
  const g = Math.round(pa[1] + (pb[1] - pa[1]) * t);
  const bl = Math.round(pa[2] + (pb[2] - pa[2]) * t);
  return `rgb(${r},${g},${bl})`;
}
function packHex(h) {
  const s = h.replace("#", "");
  return s.length === 3
    ? s.split("").map(c => parseInt(c + c, 16))
    : [parseInt(s.slice(0,2),16), parseInt(s.slice(2,4),16), parseInt(s.slice(4,6),16)];
}

// ── BubblePicker sphere helpers ──────────────────────────────────────────
// Deterministic per-key hash so every widget always gets the same shadow
// direction and turbulence seed regardless of render order.
const BUBBLE_SHADOW_OFFSETS = [
  [-20, -20], [ 20, -20], [-20,  20], [ 20,  20],
  [  0, -28], [ 28,   0], [  0,  28], [-28,   0],
  [-16,  24], [ 24, -16], [-24,  16], [ 16,  24],
];
const BUBBLE_SEEDS = [3, 7, 12, 17, 23, 29, 37, 41, 47, 53, 61, 67];
function bubbleKeyHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) >>> 0;
  return h;
}

function BubblePicker({ availableWidgets, onAdd, onClose }) {
  const [closing, setClosing] = useState(false);
  const [circles, setCircles] = useState([]);
  const [hovered, setHovered] = useState(-1);
  const widgets = availableWidgets || [];

  // Physics: single ref per bubble — rAF writes translate+scale together
  const circleRefs = useRef([]);
  const hovRef     = useRef(-1);      // mirrors hovered state; read by rAF without triggering renders
  const mouseRef   = useRef({ x: -9999, y: -9999 }); // off-screen until first real move
  const physRef    = useRef([]);      // [{x,y,vx,vy,sc}] per bubble — physics state
  const sleepRef   = useRef(false);   // true when loop is stopped; wakes on mousemove
  const rafRef     = useRef(null);
  const isTouch    = useRef(false);

  function handleClose() {
    setClosing(true);
    setTimeout(() => onClose(), 300);
  }

  useEffect(() => {
    isTouch.current = window.matchMedia("(hover: none) and (pointer: coarse)").matches;
  }, []);

  useEffect(() => {
    function onKey(e) { if (e.key === "Escape") handleClose(); }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  useEffect(() => {
    const W = window.innerWidth;
    const H = window.innerHeight;
    const engine = createPackEngine({
      maxRadius: () => Math.min(260, Math.min(W, H) * 0.28),
      minRadius: () => 56,
      growSpeed: () => 8,
      spawnRate: () => 1,
    });
    engine.resize(W, H);
    for (let i = 0; i < 6000; i++) engine.step(1 / 60);
    const raw = engine.getCircles().filter(c => c.settled && c.r >= 56);
    raw.sort((a, b) => b.r - a.r);
    const mapped = widgets.slice(0, raw.length).map((key, idx) => ({
      key,
      x: raw[idx].x,
      y: raw[idx].y,
      r: raw[idx].r,
    }));
    setCircles(mapped);
  }, [widgets.join(",")]);

  // Physics loop — spring + cursor repulsion + bubble-to-bubble repulsion
  useEffect(() => {
    if (isTouch.current || circles.length === 0) return;

    // Per-bubble mutable state. Never triggers React renders.
    physRef.current = circles.map(() => ({ x: 0, y: 0, vx: 0, vy: 0, sc: 1 }));
    sleepRef.current = false;

    // ── Tuning constants ────────────────────────────────────────────────────
    const SPRING_K         = 0.04;  // restoring force toward home per px of displacement
    const DAMPING          = 0.82;  // velocity decay per frame (friction)
    const CURSOR_R         = 200;   // px — radius of cursor influence
    const CURSOR_F         = 1.2;   // peak force at cursor centre
    const REPULSION_F      = 1.5;   // bubble-bubble force per unit normalised overlap
    const BUBBLE_GAP       = 4;     // px clearance added to r_i + r_j before repulsion fires
    const MAX_V            = 15;    // velocity cap, px / frame
    const IDLE_EPS         = 0.02;  // activity below which a bubble counts as still
    const IDLE_CUTOFF      = 120;   // frames of quiet before the loop sleeps (~2 s at 60 fps)
    // ────────────────────────────────────────────────────────────────────────

    let idleCount = 0;

    function tick() {
      const phys = physRef.current;
      const n    = phys.length;
      const mx   = mouseRef.current.x;
      const my   = mouseRef.current.y;

      // ── Pass 1: spring + cursor force → velocity → position ─────────────
      for (let i = 0; i < n; i++) {
        const p  = phys[i];
        const ci = circles[i];

        // Spring pulls back toward home offset (0, 0)
        let fx = -p.x * SPRING_K;
        let fy = -p.y * SPRING_K;

        // Cursor pushes the bubble away from the mouse position
        const bx   = ci.x + p.x;     // actual bubble centre x
        const by   = ci.y + p.y;     // actual bubble centre y
        const dxM  = bx - mx;
        const dyM  = by - my;
        const dstM = Math.sqrt(dxM * dxM + dyM * dyM) || 0.001;
        if (dstM < CURSOR_R) {
          const t = 1 - dstM / CURSOR_R;         // 1 at centre, 0 at edge
          const f = t * t * CURSOR_F;             // quadratic falloff
          fx += (dxM / dstM) * f;
          fy += (dyM / dstM) * f;
        }

        // Integrate
        p.vx = (p.vx + fx) * DAMPING;
        p.vy = (p.vy + fy) * DAMPING;
        if (p.vx >  MAX_V) p.vx =  MAX_V;
        if (p.vx < -MAX_V) p.vx = -MAX_V;
        if (p.vy >  MAX_V) p.vy =  MAX_V;
        if (p.vy < -MAX_V) p.vy = -MAX_V;
        p.x += p.vx;
        p.y += p.vy;
      }

      // ── Pass 2: bubble-to-bubble soft repulsion ──────────────────────────
      // O(n²) but n ≤ ~12 so this is ~66 iterations — negligible.
      for (let i = 0; i < n; i++) {
        for (let j = i + 1; j < n; j++) {
          const pi  = phys[i];
          const pj  = phys[j];
          const dx  = (circles[i].x + pi.x) - (circles[j].x + pj.x);
          const dy  = (circles[i].y + pi.y) - (circles[j].y + pj.y);
          const dst = Math.sqrt(dx * dx + dy * dy) || 0.001;
          const min = circles[i].r + circles[j].r + BUBBLE_GAP;
          if (dst < min) {
            // Overlap as a fraction of min distance → soft, not rigid
            const overlap = (min - dst) / min;
            const f  = overlap * REPULSION_F;
            const nx = dx / dst;
            const ny = dy / dst;
            pi.vx += nx * f;  pi.vy += ny * f;
            pj.vx -= nx * f;  pj.vy -= ny * f;
          }
        }
      }

      // ── Pass 3: hover scale lerp + activity measure ──────────────────────
      let maxActivity = 0;
      for (let i = 0; i < n; i++) {
        const p        = phys[i];
        const targetSc = hovRef.current === i ? 1.05 : 1;
        p.sc          += (targetSc - p.sc) * 0.18;
        const a = Math.abs(p.vx) + Math.abs(p.vy) + Math.abs(p.x) + Math.abs(p.y) + Math.abs(p.sc - 1);
        if (a > maxActivity) maxActivity = a;
      }

      // ── Pass 4: render ───────────────────────────────────────────────────
      const active = maxActivity > IDLE_EPS || hovRef.current !== -1;
      if (active) {
        idleCount = 0;
        for (let i = 0; i < n; i++) {
          const el = circleRefs.current[i];
          if (!el) continue;
          const p = phys[i];
          el.style.transform =
            `translate(${p.x.toFixed(2)}px,${p.y.toFixed(2)}px) scale(${p.sc.toFixed(4)})`;
        }
      } else {
        idleCount++;
        if (idleCount > IDLE_CUTOFF) {
          // Snap everything to exact rest, then stop the loop
          for (let i = 0; i < n; i++) {
            const p = phys[i];
            p.x = p.y = p.vx = p.vy = 0; p.sc = 1;
            const el = circleRefs.current[i];
            if (el) el.style.transform = "";
          }
          sleepRef.current = true;
          return; // no next rAF — loop is sleeping
        }
      }

      rafRef.current = requestAnimationFrame(tick);
    }

    function onMove(e) {
      mouseRef.current = { x: e.clientX, y: e.clientY };
      // If the loop went to sleep, wake it on the first mouse event
      if (sleepRef.current) {
        sleepRef.current = false;
        rafRef.current = requestAnimationFrame(tick);
      }
    }
    window.addEventListener("mousemove", onMove, { passive: true });

    rafRef.current = requestAnimationFrame(tick);

    return () => {
      window.removeEventListener("mousemove", onMove);
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
    };
  }, [circles]);

  return (
    <div
      onClick={handleClose}
      style={{
        position: "fixed", inset: 0, zIndex: 500,
        background: "var(--bg)",
        opacity: closing ? 0 : 1,
        transition: "opacity 0.3s ease",
      }}
    >
      {circles.map((c, i) => {
        const label    = WIDGET_CATALOGUE[c.key]?.title || c.key;
        const fontSize = c.r > 170 ? 28 : c.r > 120 ? 22 : c.r > 88 ? 18 : 14;
        const isHov    = hovered === i;
        const diam     = c.r * 2;

        const h = bubbleKeyHash(c.key);
        const [shadowX, shadowY] = BUBBLE_SHADOW_OFFSETS[h % BUBBLE_SHADOW_OFFSETS.length];
        const seed     = BUBBLE_SEEDS[h % BUBBLE_SEEDS.length];
        const filterId = `turb-${c.key}`;

        return (
          // Single bubble div — rAF writes translate+scale here imperatively.
          // bubbleIn entrance animation lives on the inner child so it never
          // conflicts with the rAF-owned transform on this element.
          <div
            ref={el => { circleRefs.current[i] = el; }}
            key={c.key}
            onClick={e => { e.stopPropagation(); onAdd(c.key); onClose(); }}
            onMouseEnter={() => { setHovered(i);  hovRef.current = i;  }}
            onMouseLeave={() => { setHovered(-1); hovRef.current = -1; }}
            style={{
              position: "absolute",
              left: c.x - c.r,
              top:  c.y - c.r,
              width: diam,
              height: diam,
              willChange: "transform",
              cursor: "pointer",
              borderRadius: "50%",
              outline: isHov ? "3px solid var(--accent)" : "3px solid transparent",
              outlineOffset: 2,
              transition: "outline-color 0.3s ease",
            }}
          >
            {/* Inner child — carries bubbleIn entrance animation only.
                overflow:hidden clips sphere layers to the circle shape.
                rAF never touches this element. */}
            <div style={{
              position: "relative",
              width: "100%",
              height: "100%",
              borderRadius: "50%",
              overflow: "hidden",
              animation: `bubbleIn 0.5s cubic-bezier(0.34,1.56,0.64,1) ${i * 0.055}s both`,
            }}>
              {/* Layer 1 — base sphere with directional inner rim glow */}
              <div style={{
                position: "absolute",
                inset: 0,
                borderRadius: 500,
                background: "var(--bg)",
                boxShadow: `${shadowX}px ${shadowY}px 30px 10px rgba(232,254,103,0.80) inset`,
              }} />

              {/* Layer 2 — displaced hue overlay (88% of diameter, centered) */}
              <svg
                width="88%"
                height="88%"
                viewBox="0 0 100 100"
                style={{
                  position: "absolute",
                  top: "6%", left: "6%",
                  pointerEvents: "none",
                  overflow: "visible",
                }}
              >
                <defs>
                  <filter id={filterId} x="-10%" y="-10%" width="120%" height="120%" colorInterpolationFilters="sRGB">
                    <feTurbulence type="fractalNoise" baseFrequency="0.999 0.999" numOctaves="3" seed={seed} result="noise" />
                    <feDisplacementMap in="SourceGraphic" in2="noise" scale="200" xChannelSelector="R" yChannelSelector="G" />
                  </filter>
                </defs>
                <g opacity="0.6" style={{ mixBlendMode: "hue" }} filter={`url(#${filterId})`}>
                  <circle cx="50" cy="50" r="50" fill="#ECEFEC" fillOpacity="0.98" />
                </g>
              </svg>

              {/* Layer 3 — label, centered inside the sphere */}
              <div style={{
                position: "absolute",
                inset: 0,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                pointerEvents: "none",
                zIndex: 2,
              }}>
                <span style={{
                  fontFamily: "'Instrument Serif', Georgia, serif",
                  fontSize,
                  fontWeight: 400,
                  color: "var(--ink)",
                  lineHeight: 1.15,
                  textAlign: "center",
                  maxWidth: c.r * 1.5,
                  display: "-webkit-box",
                  WebkitLineClamp: 2,
                  WebkitBoxOrient: "vertical",
                  overflow: "hidden",
                  pointerEvents: "none",
                }}>{label}</span>
              </div>
            </div>
          </div>
        );
      })}

      <button
        onClick={e => { e.stopPropagation(); handleClose(); }}
        style={{
          position: "absolute", top: 24, right: 24,
          width: 40, height: 40, borderRadius: "50%",
          background: "rgba(0,0,0,0.06)",
          border: "none", cursor: "pointer",
          fontSize: 18, color: "rgba(0,0,0,0.5)",
          display: "flex", alignItems: "center", justifyContent: "center",
          zIndex: 10,
          transition: "background 0.15s",
        }}
        onMouseEnter={e => e.currentTarget.style.background = "rgba(0,0,0,0.10)"}
        onMouseLeave={e => e.currentTarget.style.background = "rgba(0,0,0,0.06)"}
      >×</button>

    </div>
  );
}

function ScreenHome({ role, go }) {
  const { userName } = useContext(AppContext);
  const startingWidgets = (role && ROLE_PRESETS[role]) ? ROLE_PRESETS[role] : ROLE_PRESETS.designer;

  const [widgets, setWidgetsState] = useState(() => {
    try {
      const saved = localStorage.getItem("archive-home-widgets");
      if (saved) {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed)) {
          return parsed.filter(k => WIDGET_CATALOGUE[k]);
        }
      }
    } catch (_) {}
    return startingWidgets;
  });

  function persist(next) {
    try { localStorage.setItem("archive-home-widgets", JSON.stringify(next)); } catch (_) {}
  }
  function setWidgets(updater) {
    setWidgetsState(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      persist(next);
      return next;
    });
  }

  // ---- Drag state ----
  const [draggedKey, setDraggedKey] = useState(null);
  const [dragInfo, setDragInfo] = useState(null);
  const [mousePos, setMousePos] = useState(null);
  const [outsideGrid, setOutsideGrid] = useState(false);
  const gridRef = useRef(null);
  const ghostSlotRef = useRef(null);

  function onWidgetDragStart(key, rect, mouseX, mouseY) {
    setDraggedKey(key);
    setDragInfo({
      width: rect.width,
      height: rect.height,
      offsetX: mouseX - rect.left,
      offsetY: mouseY - rect.top,
    });
    setMousePos({ x: mouseX, y: mouseY });
    setOutsideGrid(false);
  }

  useEffect(() => {
    if (!draggedKey) return;

    function pointerInsideGrid(px, py) {
      const r = gridRef.current && gridRef.current.getBoundingClientRect();
      if (!r) return false;
      return px >= r.left && px <= r.right && py >= r.top && py <= r.bottom;
    }

    function onMove(ev) {
      setMousePos({ x: ev.clientX, y: ev.clientY });
      const inside = pointerInsideGrid(ev.clientX, ev.clientY);
      setOutsideGrid(!inside);

      if (inside) {
        const els = document.elementsFromPoint(ev.clientX, ev.clientY);
        for (const el of els) {
          const tk = el.dataset && el.dataset.widgetKey;
          if (tk && tk !== draggedKey) {
            setWidgetsState(prev => {
              const fromIdx = prev.indexOf(draggedKey);
              const toIdx = prev.indexOf(tk);
              if (fromIdx < 0 || toIdx < 0 || fromIdx === toIdx) return prev;
              const next = [...prev];
              [next[fromIdx], next[toIdx]] = [next[toIdx], next[fromIdx]];
              persist(next);
              return next;
            });
            break;
          }
        }
      }
    }

    function onUp(ev) {
      const inside = pointerInsideGrid(ev.clientX, ev.clientY);
      if (!inside) {
        setWidgets(arr => arr.filter(w => w !== draggedKey));
      }
      setDraggedKey(null);
      setDragInfo(null);
      setMousePos(null);
      setOutsideGrid(false);
    }

    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
    return () => {
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
    };
  }, [draggedKey]);

  // ---- Picker state ----
  const [pickerOpen, setPickerOpen] = useState(false);

                  position: "absolute", top: "calc(100% + 8px)", left: 0, right: 0,
                  background: SURFACE,
                  border: "1px solid rgba(26,31,38,0.08)", borderRadius: 14,
                  boxShadow: "0px 8px 24px rgba(0,0,0,0.06)",
                  padding: 14,
                }}>
                  <div style={{
                    fontSize: 10, color: MUTED, letterSpacing: 0.8,
                    textTransform: "uppercase", fontWeight: 600, marginBottom: 8,
                  }}>
                    {searchQuery.trim()
                      ? (searchResults.length ? `${searchResults.length} ${searchResults.length === 1 ? "result" : "results"}` : "No matches")
                      : "Jump to"}
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                    {searchResults.length === 0 && (
                      <div style={{ padding: "10px 12px", fontSize: 13, color: MUTED }}>
                        Nothing matches “{searchQuery}”. Try “photo”, “logo”, “colour”…
                      </div>
                    )}
                    {searchResults.slice(0, 6).map((s, i) => (
                      <div
                        key={s.label}
                        onMouseDown={(e) => { e.preventDefault(); setSearchFocused(false); setSearchQuery(""); go(s.to); }}
                        style={{
                          padding: "10px 12px", borderRadius: 8, cursor: "pointer",
                          background: i === 0 ? "rgba(0,0,0,0.04)" : "transparent",
                          display: "flex", alignItems: "center", gap: 12,
                          animation: `tileIn 0.34s cubic-bezier(0.22,1,0.36,1) backwards`,
                          animationDelay: `${i * 35}ms`,
                        }}
                        onMouseEnter={(e) => e.currentTarget.style.background = "rgba(0,0,0,0.06)"}
                        onMouseLeave={(e) => e.currentTarget.style.background = i === 0 ? "rgba(0,0,0,0.04)" : "transparent"}
                      >
                        <span style={{
                          width: 26, height: 26, borderRadius: 13, flexShrink: 0,
                          background: "var(--ph-2)", color: DARK,
                          display: "flex", alignItems: "center", justifyContent: "center",
                          fontFamily: HOME_SERIF, fontSize: 14,
                        }}>{s.label.charAt(0)}</span>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 13, color: DARK, fontWeight: 500 }}>{s.label}</div>
                          <div style={{ fontSize: 11, color: MUTED, marginTop: 1 }}>{s.hint}</div>
                        </div>
                        <span style={{ color: MUTED, fontSize: 12 }}>↗</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>

        {/* Widget grid */}
        <div
          ref={gridRef}
          style={{
            marginTop: 40,
            display: "grid",
            gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))",
            gap: 20,
            position: "relative", zIndex: 1,
            transition: "opacity 0.25s ease",
            opacity: pickerOpen ? 0.15 : 1,
            pointerEvents: pickerOpen ? "none" : "auto",
          }}
        >
          {widgets.map((key, idx) => {
            const w = WIDGET_CATALOGUE[key];
            if (!w) return null;
            return (
              <HomeWidgetTile
                key={key}
                widgetKey={key}
                widget={w}
                go={go}
                index={idx}
                justAdded={justAddedKey === key}
                isDragged={draggedKey === key}
                isAnyDragging={!!draggedKey}
                onDragStart={onWidgetDragStart}
              />
            );
          })}

          {/* Ghost slot */}
          <button
            ref={ghostSlotRef}
            onClick={openPicker}
            style={{
              height: 260, borderRadius: 14,
              border: `1px dashed var(--border)`,
              background: "transparent",
              color: "var(--muted)", fontSize: 12, cursor: "pointer",
              display: "flex", flexDirection: "column",
              alignItems: "center", justifyContent: "center", gap: 12,
              transition: "border-color 0.15s, background 0.15s, color 0.15s",
              fontFamily: "inherit",
            }}
            onMouseEnter={(e) => {
              e.currentTarget.style.borderColor = "var(--ink)";
              e.currentTarget.style.color = "var(--ink)";
              e.currentTarget.style.background = "var(--faint)";
            }}
            onMouseLeave={(e) => {
              e.currentTarget.style.borderColor = "var(--border)";
              e.currentTarget.style.color = "var(--muted)";
              e.currentTarget.style.background = "transparent";
            }}
          >
            <div style={{
              width: 46, height: 46, borderRadius: 23,
              border: `1.5px solid currentColor`,
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 22, fontWeight: 300,
            }}>+</div>
            <span style={{ letterSpacing: 0.4, fontFamily: "'Inter', sans-serif", fontSize: 14 }}>Add widget</span>
          </button>
        </div>
      </div>

      {/* Floating dragged ghost */}
      {draggedKey && draggedWidget && mousePos && dragInfo && (
        <div style={{
          position: "fixed",
          left: mousePos.x - dragInfo.offsetX,
          top: mousePos.y - dragInfo.offsetY,
          width: dragInfo.width, height: dragInfo.height,
          background: SURFACE,
          border: outsideGrid ? "2px solid rgba(192,60,60,0.55)" : `1px solid var(--ink)`,
          borderRadius: 14,
          padding: 20,
          pointerEvents: "none",
          zIndex: 200,
          transform: "scale(1.04)",
          transformOrigin: "center",
          display: "flex", flexDirection: "column",
          transition: "box-shadow 0.15s, border-color 0.15s",
        }}>
          <div style={{
            fontSize: 14, fontWeight: 600, color: DARK,
            letterSpacing: -0.1, marginBottom: 16,
          }}>{draggedWidget.title}</div>
          <div style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column" }}>
            {draggedWidget.render(go)}
          </div>
        </div>
      )}

      {/* Outside-grid removal tooltip */}
      {draggedKey && outsideGrid && mousePos && (
        <div style={{
          position: "fixed",
          left: mousePos.x + 18, top: mousePos.y + 18,
          background: SURFACE,
          border: "1px solid rgba(192,60,60,0.4)",
          color: "#a04040",
          padding: "6px 12px",
          borderRadius: 14,
          fontSize: 11, fontWeight: 500, letterSpacing: 0.2,
          pointerEvents: "none", zIndex: 300,
        }}>Release to remove</div>
      )}

      {/* Bubble picker */}
      {pickerOpen && (
        <BubblePicker
          availableWidgets={availableToAdd}
          onAdd={addWidget}
          onClose={() => setPickerOpen(false)}
        />
      )}
    </Shell>
  );
}

// =============== ROUTER ===============
function App() {
  const [screen, setScreen] = useState("role");
  const [role, setRole] = useState(null);
  const [userName, setUserName] = useState("");
  const [openTabs, setOpenTabs] = useState([]);
  // Dark theme removed — app is light-only
  const theme = "light";
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", "light");
  }, []);
  function toggleTheme() {}

  const go = (s) => {
    setScreen(s);
    window.scrollTo(0, 0);
    const tool = toolForScreen(s);
    if (tool) setOpenTabs(prev => prev.includes(tool) ? prev : [...prev, tool]);
  };

  function closeTab(toolKey) {
    setOpenTabs(prev => {
      const next = prev.filter(t => t !== toolKey);
      const curTool = toolForScreen(screen);
      if (curTool === toolKey) {
        if (next.length > 0) {
          const target = TOOLS.find(t => t.key === next[next.length - 1]);
          setScreen(target ? target.to : "home");
        } else {
          setScreen("home");
        }
        window.scrollTo(0, 0);
      }
      return next;
    });
  }

  function chooseRole(r) {
    setRole(r);
    go("home");
  }
  function changeRole() { go("role"); }
  function resetOnboarding() {
    try {
      localStorage.removeItem("archive-home-widgets");
      localStorage.removeItem("archive-role");
    } catch (_) {}
    setRole(null);
    setOpenTabs([]);
    go("role");
  }

  const ctx = { role, changeRole, resetOnboarding, openTabs, closeTab, theme, toggleTheme, userName, setUserName };

  let content;
  if (screen === "role") {
    content = <ScreenRole onChoose={chooseRole} onSkip={() => go("home")} />;
  } else {
    switch (screen) {
      case "home":        content = <ScreenHome role={role} go={go} onChangeRole={changeRole} />; break;
      case "library":     content = <ScreenLibrary go={go} />; break;
      case "files":       content = <ScreenFiles go={go} />; break;
      case "photo":       content = <ScreenPhoto go={go} />; break;
      case "creator":     content = <ScreenCreator go={go} />; break;
      case "signature":   content = <ScreenSignature go={go} />; break;
      case "social":      content = <ScreenSocial go={go} />; break;
      case "onboarding":  content = <ScreenOnboarding go={go} />; break;
      case "memory":      content = <ScreenMemory go={go} />; break;
      default:            content = <ScreenHome role={role} go={go} onChangeRole={changeRole} />;
    }
  }

  return <AppContext.Provider value={ctx}>{content}</AppContext.Provider>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
