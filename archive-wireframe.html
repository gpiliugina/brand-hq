<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Archive — Wireframe Prototype</title>
<meta name="viewport" content="width=1280" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #ECEDEF;
    --surface: #FFFFFF;
    --ink: #404040;
    --solid: #141414;
    --muted: #888888;
    --border: #E2E2E2;
    --faint: #F5F5F6;
    --accent: #E8FE67;
    --accent-bubble: rgba(232,254,103,0.82);
    --accent-glow: rgba(232,254,103,0.18);
    --accent-subtle: rgba(232,254,103,0.08);
    --tile-border: rgba(0,0,0,0.06);
    --ph-1: #FAFAFA; --ph-2: #F2F2F2; --ph-3: #E8E8E8; --ph-4: #D4D4D4;
    --line: rgba(0,0,0,0.06);
    --grid-dot: rgba(0,0,0,0.07);
    --ok-bg: #E1E8DC; --ok-fg: #3a6a3a;
    --bad-bg: #F4DDDD; --bad-fg: #7a5050;
    --sp-a: #C8C0D8; --sp-b: #B4C8B8; --sp-c: #D0C0B8; --sp-d: #B8C4D4; --sp-e: #D4C0D0;
    /* ── Typography scale ── */
    --font-size-body: 13px;
    --font-size-input: 22px;
    --font-weight-regular: 400;
    --line-height-base: 1.4;
    --letter-spacing-hero: -0.03em;

    /* ── Grid pattern ── */
    --grid-dot-size: 1px;
    --grid-bg-size: 28px 28px;

    /* ── Z-index scale ── */
    --z-0: 0;
    --z-2: 2;
    --z-3: 3;
    --z-4: 4;
    --z-overlay: 999;

    /* ── Radius ── */
    --radius-full: 50%;
    --radius-input: 18px;

    /* ── Spacing ── */
    --space-lg: 16px;
    --space-xl: 20px;
    --space-7: 28px;

    /* ── Motion ── */
    --duration-fast: 0.12s;
    --duration-base: 0.22s;
    --duration-slow: 0.3s;
    --duration-screen: 0.6s;
    --ease-smooth: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-in-out: cubic-bezier(0.83, 0, 0.17, 1);
    --ease-out: ease;

    /* ── Photo treatment (mirrors design-system/tokens.css) ── */
    --photo-tint: rgba(20, 20, 40, 0.12);
    --photo-rim-shadow:
      inset 0 0 0 1.5px rgba(255, 255, 255, 0.25),
      inset -6px -6px 18px rgba(0, 0, 0, 0.55),
      inset 4px 4px 12px rgba(255, 255, 255, 0.18),
      0 8px 32px rgba(0, 0, 0, 0.22),
      0 2px 8px rgba(0, 0, 0, 0.14);
    --photo-iris-gradient: conic-gradient(
      from 200deg,
      rgba(120, 80, 220, 0.28) 0deg,
      rgba(60, 160, 255, 0.22) 60deg,
      rgba(80, 220, 180, 0.18) 100deg,
      rgba(240, 220, 60, 0.14) 140deg,
      rgba(255, 100, 80, 0.20) 200deg,
      rgba(200, 60, 220, 0.25) 260deg,
      rgba(120, 80, 220, 0.28) 360deg
    );
    --photo-spec-gradient: radial-gradient(
      ellipse at 40% 35%,
      rgba(255, 255, 255, 0.72) 0%,
      rgba(255, 255, 255, 0.22) 45%,
      rgba(255, 255, 255, 0) 100%
    );
    --photo-depth-gradient: radial-gradient(
      ellipse at 60% 80%,
      rgba(0, 0, 0, 0.38) 0%,
      rgba(0, 0, 0, 0) 100%
    );
    --photo-filter: url(#liquid-glass);
    --photo-hover-scale: 1.06;
    --photo-press-scale: 0.95;
    --photo-transition: transform var(--duration-slow) var(--ease-spring);

    /* ── Sphere treatment ── */
    --sphere-shadow:
      inset -5px -5px 12px rgba(0, 0, 0, 0.20),
      inset 4px 4px 10px rgba(255, 255, 255, 0.60);
    --sphere-spec-gradient: radial-gradient(circle, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0) 100%);
    --sphere-depth-gradient: radial-gradient(circle, rgba(0, 0, 0, 0.18) 0%, rgba(0, 0, 0, 0) 100%);

    /* ── Liquid glass overlay layers ── */
    --glass-spec-gradient: radial-gradient(ellipse at 38% 32%, rgba(255,255,255,0.68) 0%, rgba(255,255,255,0.20) 50%, rgba(255,255,255,0) 100%);
    --glass-depth-gradient: radial-gradient(ellipse at 55% 85%, rgba(0,0,0,0.22) 0%, rgba(0,0,0,0) 100%);
    --glass-rim: inset 0 0 0 1px rgba(255,255,255,0.35);
    --glass-fallback: radial-gradient(circle at 35% 30%, #D4D0E0 0%, #9080A8 100%);

    /* ── Sphere selected-state glow ── */
    --sphere-selected-glow: rgba(232,254,103,0.20);
    --sphere-selected-glow-0: rgba(232,254,103,0);

    /* ── Shadows ── */
    --shadow-name-field: 0 10px 40px rgba(0,0,0,0.05);

    /* ── Placeholder / CTA text ── */
    --placeholder: #9AA0A6;

    color-scheme: light;
  }
  /* dark theme removed — app is light-only */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; width: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background-color: var(--bg);
    background-image: radial-gradient(circle, var(--grid-dot) var(--grid-dot-size), transparent var(--grid-dot-size));
    background-size: var(--grid-bg-size);
    background-attachment: fixed;
    color: var(--ink);
    font-size: var(--font-size-body);
    line-height: var(--line-height-base);
    -webkit-font-smoothing: antialiased;
    min-width: 1280px;
    transition: background-color var(--duration-slow) var(--ease-out), color var(--duration-slow) var(--ease-out);
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  input { font-family: inherit; outline: none; }
  a { color: inherit; text-decoration: none; cursor: pointer; }
  ::placeholder { color: var(--placeholder); }

  @keyframes chipIdleFloat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-5px); }
  }
  @keyframes faviconPulse {
    0% { transform: scale(1); }
    40% { transform: scale(0.94); }
    100% { transform: scale(1); }
  }
  @keyframes lineDraw {
    from { stroke-dashoffset: 200; }
    to { stroke-dashoffset: 0; }
  }
  @keyframes screenIn {
    from { opacity: 0; transform: translateY(18px) scale(0.99); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes heroIn {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes tileIn {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes widgetAddIn {
    0%   { opacity: 0; transform: scale(0.5); }
    60%  { opacity: 1; transform: scale(1.04); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes popIn {
    0%   { opacity: 0; transform: scale(0.75); }
    65%  { opacity: 1; transform: scale(1.06); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes bubbleIn {
    0%   { opacity: 0; transform: scale(0); }
    65%  { opacity: 1; transform: scale(1.08); }
    100% { opacity: 1; transform: scale(1); }
  }
  .lift-hover {
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s ease;
  }
  .lift-hover:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.10); }
  .press-fx { transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1); }
  .press-fx:active { transform: scale(0.93); }

  /* Liquid glass photo circle */
  .photo-liquid {
    border-radius: var(--radius-full);
    position: relative;
    overflow: hidden;
    display: inline-block;
    filter: url(#liquid-glass);
    transition: transform var(--duration-slow) var(--ease-spring);
  }
  .photo-liquid:hover  { transform: scale(var(--photo-hover-scale)); }
  .photo-liquid:active { transform: scale(var(--photo-press-scale)); }

  .photo-liquid img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center top;
    display: block; border-radius: var(--radius-full);
    pointer-events: none;
  }

  .photo-liquid-spec {
    position: absolute; top: 5%; left: 8%;
    width: 48%; height: 42%;
    background: var(--glass-spec-gradient);
    border-radius: var(--radius-full);
    transform: rotate(-18deg);
    pointer-events: none; z-index: var(--z-2);
  }

  .photo-liquid-rim {
    position: absolute; inset: 0;
    border-radius: var(--radius-full);
    box-shadow: var(--glass-rim);
    pointer-events: none; z-index: var(--z-3);
  }

  .photo-liquid-depth {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 50%;
    background: var(--glass-depth-gradient);
    border-radius: 0 0 var(--radius-full) var(--radius-full);
    pointer-events: none; z-index: var(--z-2);
  }

  .photo-liquid-selected { box-shadow: 0 0 0 3px var(--accent); }
  .photo-liquid-strong   { filter: url(#liquid-glass-strong); }
  .photo-liquid-subtle   { filter: url(#liquid-glass-subtle); }

  /* Ghost atmospheric type */
  .ghost {
    font-family: 'Libre Caslon Display', Georgia, serif;
    position: absolute; pointer-events: none; user-select: none;
    color: var(--ink); opacity: 0.04; line-height: 1;
    z-index: var(--z-0); white-space: nowrap; letter-spacing: var(--letter-spacing-hero);
  }

  /* Sphere animations */
  @keyframes sphereIn {
    from { opacity: 0; transform: scale(0.7); filter: blur(4px); }
    to   { opacity: 1; transform: scale(1);   filter: blur(0); }
  }
  @keyframes sphereBounce {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.18); }
    70%  { transform: scale(0.92); }
    100% { transform: scale(1); }
  }
  @keyframes sphereFloat {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    33%       { transform: translateY(-6px) rotate(1deg); }
    66%       { transform: translateY(-3px) rotate(-0.5deg); }
  }
  @keyframes heroIn {
    from { opacity: 0; transform: translateY(20px); filter: blur(6px); }
    to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateX(-16px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes bubbleMerge {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes markerReveal {
    from { background-size: 0% 100%; }
    to   { background-size: 100% 100%; }
  }
  @keyframes dotPop {
    0%  { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.4); }
    100%{ transform: scale(1); opacity: 1; }
  }
  @keyframes screenIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes floatGhost {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-10px); }
  }

.s-btn {
    transition: opacity var(--duration-fast) var(--ease-out), transform var(--duration-fast) var(--ease-out);
    cursor: pointer;
  }
  .s-btn:hover  { opacity: 0.82; }
  .s-btn:active { transform: scale(0.94); }

  /* Bubble float animations — each unique */
  @keyframes bubbleFloat1 {
    0%, 100% { transform: translate(0px, 0px) rotate(0deg); }
    25%       { transform: translate(8px, -18px) rotate(0.6deg); }
    50%       { transform: translate(-6px, -28px) rotate(-0.4deg); }
    75%       { transform: translate(10px, -14px) rotate(0.3deg); }
  }
  @keyframes bubbleFloat2 {
    0%, 100% { transform: translate(0px, 0px) rotate(0deg); }
    30%       { transform: translate(-10px, -22px) rotate(-0.5deg); }
    60%       { transform: translate(8px, -30px) rotate(0.4deg); }
    80%       { transform: translate(-4px, -16px) rotate(-0.2deg); }
  }
  @keyframes bubbleFloat3 {
    0%, 100% { transform: translate(0px, 0px) rotate(0deg); }
    20%       { transform: translate(12px, -12px) rotate(0.7deg); }
    55%       { transform: translate(-8px, -24px) rotate(-0.3deg); }
    85%       { transform: translate(6px, -18px) rotate(0.5deg); }
  }
  @keyframes bubbleFloat4 {
    0%, 100% { transform: translate(0px, 0px) rotate(0deg); }
    35%       { transform: translate(-6px, -20px) rotate(-0.6deg); }
    65%       { transform: translate(10px, -26px) rotate(0.4deg); }
    90%       { transform: translate(-8px, -12px) rotate(-0.3deg); }
  }

  /* Bubble appear */
  @keyframes liquidBubbleIn {
    0%   { opacity: 0; transform: scale(0.6) translateY(40px); filter: blur(12px); }
    60%  { filter: blur(0px); }
    80%  { transform: scale(1.05) translateY(-4px); }
    100% { opacity: 1; transform: scale(1) translateY(0px); }
  }

  /* Name input appear */
  @keyframes inputReveal {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Wordmark reveal */
  @keyframes wordmarkIn {
    from { opacity: 0; letter-spacing: 0.1em; filter: blur(8px); }
    to   { opacity: 1; letter-spacing: -0.04em; filter: blur(0); }
  }

  /* Sign-in name field — plain white, rounded, no stroke */
  .name-field {
    background: var(--surface);
    border: none;
    outline: none;
    border-radius: var(--radius-input);
    padding: var(--space-xl) var(--space-7);
    width: 440px;
    font-size: var(--font-size-input);
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    text-align: center;
    caret-color: var(--ink);
    box-shadow: var(--shadow-name-field);
  }
  .name-field::placeholder { color: transparent; }

  /* Typewriter call-to-action overlay */
  @keyframes ctaLetterIn {
    from { filter: blur(8px); opacity: 0; transform: translateY(3px); }
    to   { filter: blur(0);   opacity: 1; transform: translateY(0); }
  }
  .cta-letter {
    display: inline-block;
    white-space: pre;
    color: var(--placeholder);
    animation: ctaLetterIn 0.42s ease backwards;
  }

  /* Required-name shake */
  @keyframes nameShake {
    0%, 100% { transform: translateX(0); }
    18%       { transform: translateX(-9px); }
    38%       { transform: translateX(8px); }
    58%       { transform: translateX(-6px); }
    78%       { transform: translateX(4px); }
  }

  /* Floating role words */
  .role-word {
    font-family: 'Libre Caslon Display', Georgia, serif;
    font-weight: var(--font-weight-regular);
    color: var(--ink);
    cursor: pointer;
    line-height: 1;
    letter-spacing: -1px;
    -webkit-text-stroke-width: 5px;
    -webkit-text-stroke-color: var(--surface);
    paint-order: stroke fill;
    -webkit-text-stroke-linejoin: round;
    text-shadow: none;
    transition:
      transform var(--duration-slow) var(--ease-spring),
      -webkit-text-stroke-color var(--duration-base) var(--ease-out),
      opacity var(--duration-slow) var(--ease-out);
    user-select: none;
  }
  .role-word:hover {
    transform: scale(1.05);
    -webkit-text-stroke-color: var(--accent);
  }
  .role-word.is-picked {
    transform: scale(1.22);
    -webkit-text-stroke-width: 5px;
    -webkit-text-stroke-color: var(--accent);
    text-shadow: none;
  }

  /* Circle-mask screen transition */
  .circle-reveal {
    position: fixed;
    inset: 0;
    z-index: var(--z-overlay);
    pointer-events: none;
    background: var(--bg);
    background-image: radial-gradient(circle, var(--grid-dot) var(--grid-dot-size), transparent var(--grid-dot-size));
    background-size: var(--grid-bg-size);
    transition: clip-path var(--duration-screen) var(--ease-in-out);
  }

  /* Bubble content (sits above sphere overlays) */
  .bubble-content {
    position: relative;
    z-index: var(--z-4);
    text-align: center;
    padding: var(--space-lg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }

  @keyframes roleWordIn {
    from {
      opacity: 0;
      transform: translateY(18px) scale(0.95);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

</style>
</head>
<body>
<!-- Liquid glass lens filters — referenced by .photo-liquid CSS classes -->
<svg style="position:absolute;width:0;height:0;overflow:hidden;pointer-events:none" aria-hidden="true">
  <defs>
    <!-- Standard lens — team photo circles -->
    <filter id="liquid-glass" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.016" numOctaves="3" seed="42" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="14" xChannelSelector="R" yChannelSelector="G" result="displaced" />
      <feGaussianBlur in="displaced" stdDeviation="0.5" result="blurred" />
      <feComposite in="blurred" in2="SourceGraphic" operator="atop" />
    </filter>
    <!-- Strong lens — large memory constellation circles -->
    <filter id="liquid-glass-strong" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.010 0.014" numOctaves="4" seed="7" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" xChannelSelector="R" yChannelSelector="G" result="displaced" />
      <feGaussianBlur in="displaced" stdDeviation="0.7" result="blurred" />
      <feComposite in="blurred" in2="SourceGraphic" operator="atop" />
    </filter>
    <!-- Subtle lens — tiny constellation circles -->
    <filter id="liquid-glass-subtle" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.022" numOctaves="2" seed="13" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="7" xChannelSelector="R" yChannelSelector="G" result="displaced" />
      <feComposite in="displaced" in2="SourceGraphic" operator="atop" />
    </filter>
  </defs>
</svg>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useRef, useEffect, useContext, createContext, Fragment } = React;

const AppContext = createContext({
  role: null,
  changeRole: () => {},
  resetOnboarding: () => {},
  openTabs: [],
  closeTab: () => {},
  theme: "light",
  toggleTheme: () => {},
  userName: "",
  setUserName: () => {},
});

const ACCENT = "var(--accent)";
const DARK = "var(--ink)";          // primary text / foreground (themable)
const SOLID = "var(--solid)";       // strong filled buttons / avatars
const SURFACE = "var(--surface)";   // card / panel background
const BORDER = "var(--border)";
const BG = "var(--bg)";
const MUTED = "var(--muted)";
const FAINT = "var(--faint)";
const HOME_BG = "var(--bg)";
const CONTENT_MAX = "100%"; // full-width content across every page
const HOME_TILE_BORDER = "var(--tile-border)";
const HOME_SERIF = "'Libre Caslon Display', Georgia, serif";

// =============== TOOLS (every working feature) ===============
const TOOLS = [
  { key: "library",    label: "Brand Library",   to: "library" },
  { key: "files",      label: "Team Photos",     to: "files" },
  { key: "memory",     label: "Photo Archive",   to: "memory" },
  { key: "signature",  label: "Email Signature", to: "signature" },
  { key: "social",     label: "Social Post",     to: "social" },
  { key: "creator",    label: "Brand Checker",   to: "creator" },
  { key: "onboarding", label: "Onboarding",      to: "onboarding" },
];
function toolForScreen(s) {
  if (s === "files" || s === "photo") return "files";
  if (TOOLS.some(t => t.key === s)) return s;
  return null;
}

// =============== UNIVERSAL TOP BAR (favicon · widgets menu · profile) ===============
function UniversalTopBar({ activeScreen, go }) {
  const { role, changeRole, resetOnboarding, openTabs, closeTab, theme, toggleTheme, userName } = useContext(AppContext);
  const userInitial = userName && userName.trim().length > 0
    ? userName.trim()[0]
    : "?";
  const profileEmail = role
    ? `${role}@brandhq.com`
    : (userName && userName.trim()
        ? `${userName.trim().toLowerCase().replace(/\s+/g, ".")}@brandhq.com`
        : "guest@brandhq.com");
  const [profileOpen, setProfileOpen] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [faviconPressed, setFaviconPressed] = useState(false);
  const profileRef = useRef(null);
  const menuRef = useRef(null);

  const isHome = activeScreen === "home";
  const currentTool = toolForScreen(activeScreen);

  useEffect(() => {
    function onDocDown(e) {
      if (profileOpen && profileRef.current && !profileRef.current.contains(e.target)) setProfileOpen(false);
      if (menuOpen && menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false);
    }
    window.addEventListener("mousedown", onDocDown);
    return () => window.removeEventListener("mousedown", onDocDown);
  }, [profileOpen, menuOpen]);

  function onFaviconClick() {
    setFaviconPressed(true);
    setTimeout(() => setFaviconPressed(false), 300);
    if (!isHome) go("home");
  }

  const roleLabels = { designer: "Designer", marketer: "Marketer", hr: "HR Manager", sales: "Sales Manager" };
  const roleLabel = role && roleLabels[role] ? roleLabels[role] : "No role yet";

  const openToolObjs = openTabs.map(k => TOOLS.find(t => t.key === k)).filter(Boolean);

  return (
    <>
      {/* LEFT — favicon sphere + merged tab chain */}
      <div style={{
        position: "fixed", top: 20, left: 24, zIndex: 120,
        display: "flex", alignItems: "center",
      }}>
        <button
          onClick={onFaviconClick}
          className="press-fx"

// =============== SHELL ===============
function Shell({ active, go, children, fullBleed }) {
  // Two-finger trackpad swipe-right → back to Home (skip Home itself
  // and the horizontally-scrolling Memory timeline to avoid conflicts).
  useEffect(() => {
    if (active === "home" || active === "memory" || active === "role") return;
    let accX = 0, lastT = 0, cooling = false;
    function onWheel(e) {
      const now = Date.now();
      if (now - lastT > 260) accX = 0;
      lastT = now;
      if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) {
        accX += e.deltaX;
        if (!cooling && accX < -150) {
          cooling = true;
          go("home");
          setTimeout(() => { cooling = false; accX = 0; }, 700);
        }
      }
    }
    window.addEventListener("wheel", onWheel, { passive: true });
    return () => window.removeEventListener("wheel", onWheel);
  }, [active]);

  return (
    <div style={{ minHeight: "100vh", color: "var(--ink)", position: "relative", overflow: "hidden" }}>
      <UniversalTopBar activeScreen={active} go={go} />
      {fullBleed ? (
        <div key={active} style={{ animation: active === "memory" ? "fadeIn 0.25s ease both" : "screenIn 0.4s cubic-bezier(0.22,1,0.36,1) backwards" }}>
          {children}
        </div>
      ) : (
        <div key={active} style={{
          padding: "100px 52px 72px",
          animation: "screenIn 0.45s cubic-bezier(0.22,1,0.36,1) backwards",
        }}>
          <div style={{ maxWidth: "100%", margin: "0 auto", position: "relative" }}>
            {children}
          </div>
        </div>
      )}
    </div>
  );
}

                <button key={s} onClick={() => setStyle(s)} style={{
                  padding: "12px 8px", borderRadius: 8, cursor: "pointer",
                  border: style === s ? `2px solid var(--ink)` : `1px solid var(--border)`,
                  background: style === s ? "var(--faint)" : "var(--surface)", textAlign: "center",
                }}>
                  <div style={{ height: 24, background: FAINT, marginBottom: 6, borderRadius: 2 }} />

                </button>
              ))}
            </div>
          </div>

          <div style={{ marginTop: 22 }}>
            <DarkButton full>Generate Signature</DarkButton>
          </div>
        </Card>

        <Card style={{ padding: 24 }}>
          <SectionLabel>Preview</SectionLabel>
          <div style={{
            marginTop: 14, height: 160, background: FAINT,
            border: `1px dashed ${BORDER}`, borderRadius: 4, padding: 20,
            display: "flex", flexDirection: "column", justifyContent: "center", gap: 4,
          }}>
            <div style={{ height: 14, width: 160, background: SOLID, borderRadius: 2 }} />
            <div style={{ height: 10, width: 110, background: "#999", borderRadius: 2 }} />
            <div style={{ width: 200, borderTop: "1.5px solid var(--border)", margin: "8px 0" }} />
            <div style={{ height: 8, width: 180, background: "#bbb", borderRadius: 2 }} />
            <div style={{ height: 8, width: 140, background: "#bbb", borderRadius: 2 }} />
            <div style={{ height: 8, width: 200, background: "#bbb", borderRadius: 2 }} />
          </div>
          <div style={{ marginTop: 14, fontSize: 12, color: "#555" }}>Looks good?</div>
          <div style={{ marginTop: 10, display: "flex", gap: 8 }}>
            <DarkButton>Copy HTML</DarkButton>
            <OutlineButton>↓ Download PNG</OutlineButton>
          </div>
          <div style={{ marginTop: 14, fontSize: 11, color: MUTED }}>
            This signature uses current brand version <Highlight>V3.2</Highlight>
          </div>
        </Card>
      </div>
    </Shell>
  );
}

// =============== SCREEN 6 — SOCIAL POST CONSTRUCTOR ===============

  { key: "colour",   label: "Colour"    },
];

  "#FFFFFF", "#F5F5F5", "#1E1C23", "#3A3744",
  "var(--ph-4)", "#B8C8D8", "#E5C8B8", "#C5D8B8",

];

const TEXT_PRESETS = [
  { key: "h1", label: "Heading", size: 44, weight: 700 },
  { key: "h2", label: "Subheading", size: 24, weight: 600 },
  { key: "p",  label: "Body", size: 14, weight: 400 },
  { key: "cap",label: "Caption", size: 11, weight: 500 },

  { key: "circ", label: "Circle"    },
  { key: "line", label: "Line"      },
  { key: "tri",  label: "Triangle"  },

  const [formatIdx, setFormatIdx] = useState(0);
  const [tool, setTool] = useState("text");
  const [bg, setBg] = useState(1);
  const [template, setTemplate] = useState(0);
  const [activePage, setActivePage] = useState(0);
  const [zoomPct, setZoomPct] = useState(100);

  const [body, setBody] = useState("Short supporting line for the campaign.");

  const fmt = SOCIAL_FORMATS[formatIdx];
  const platforms = Array.from(new Set(SOCIAL_FORMATS.map(f => f.platform)));

  function ToolIconBox({ kind, active }) {
    const c = active ? "white" : "#555";
    if (kind === "text") return <span style={{ color: c, fontSize: 18, fontFamily: "Georgia, serif", fontWeight: 700 }}>T</span>;
    if (kind === "shape") return <div style={{ width: 14, height: 14, border: `1.5px solid ${c}`, borderRadius: 2 }} />;
    if (kind === "image") return (
      <div style={{ width: 16, height: 12, border: `1.5px solid ${c}`, borderRadius: 1, position: "relative" }}>
        <div style={{ position: "absolute", bottom: 1, left: 1, right: 1, height: 4, background: c, opacity: 0.5 }} />
      </div>
    );
    if (kind === "sticker") return <div style={{ width: 14, height: 14, borderRadius: 7, border: `1.5px solid ${c}` }} />;
    if (kind === "template") return (
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 1.5, width: 14, height: 14 }}>
        {[0,1,2,3].map(i => <div key={i} style={{ background: c, opacity: 0.6 }} />)}
      </div>
    );
    if (kind === "colour") return (
      <div style={{
        width: 14, height: 14, borderRadius: 7,
        background: "conic-gradient(#ff6b6b, #f7d774, #6bd09b, #6bb1ff, #c46bff, #ff6bcd, #ff6b6b)",
        border: `1px solid ${active ? "white" : "#666"}`,
      }} />
    );
    return null;
  }

  return (
    <Shell active="social" go={go}>

      <PageHero title="Social Post" subtitle="Post constructor · multi-format" />
      {/* CONSTRUCTOR FRAME */}
      <div style={{
        height: "calc(100vh - 92px - 64px - 120px)",
        minHeight: 540,
        display: "grid",
        gridTemplateColumns: "60px 240px 1fr 280px",
        background: SURFACE,
        border: `1px solid ${BORDER}`,
        borderRadius: 8,
        overflow: "hidden",
      }}>

        {/* TOOL RAIL */}
        <div style={{
          background: "var(--ph-1)",
          borderRight: `1px solid ${BORDER}`,
          padding: "12px 0",
          display: "flex", flexDirection: "column", alignItems: "center", gap: 6,
        }}>
          {SOCIAL_TOOLS.map(t => {
            const on = tool === t.key;
            return (
              <div key={t.key} style={{ position: "relative", width: "100%" }}>
                <button
                  onClick={() => setTool(t.key)}
                  title={t.label}
                  style={{
                    width: 40, height: 40, borderRadius: 6, margin: "0 auto",
                    background: on ? DARK : "transparent",
                    border: on ? "none" : `1px solid ${BORDER}`,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    cursor: "pointer", color: on ? "white" : "#555",
                  }}
                >
                  <ToolIconBox kind={t.key} active={on} />
                </button>
                <div style={{
                  marginTop: 2, fontSize: 9, color: on ? DARK : "#888",
                  letterSpacing: 0.6, textAlign: "center",
                  fontWeight: on ? 600 : 400, textTransform: "uppercase",

              </div>
            );

        </div>

        {/* TOOL PANEL */}
        <div style={{

                  <button key={p.key} style={{

                    border: `1px solid ${BORDER}`, borderRadius: 6,
                    background: SURFACE, textAlign: "left", cursor: "pointer",
                    fontSize: Math.min(18, p.size / 2.5), fontWeight: p.weight, color: DARK,
                    lineHeight: 1.2,
                  }}>{p.label}</button>
                ))}
              </div>
              <div style={{ marginTop: 18, paddingTop: 14, borderTop: `1px solid ${BORDER}` }}>
                <SectionLabel>Font</SectionLabel>
                <div style={{
                  marginTop: 10, padding: "10px 12px",
                  border: `1px solid ${BORDER}`, borderRadius: 6,
                  fontSize: 13, color: DARK, display: "flex", justifyContent: "space-between",
                }}>
                  <span>Instrument Sans</span><span style={{ color: MUTED }}>▾</span>
                </div>
                <div style={{ marginTop: 8, fontSize: 11, color: MUTED }}>Brand font · V3.2</div>
              </div>
            </>
          )}

          {tool === "shape" && (
            <>
              <SectionLabel>Shapes</SectionLabel>
              <div style={{ marginTop: 10, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                {SHAPE_PRESETS.map(s => (
                  <button key={s.key} style={{
                    padding: 14, borderRadius: 6, cursor: "pointer",

                    <div style={{
                      width: 28, height: 28,
                      background: s.key === "line" ? "transparent" : DARK,
                      borderRadius: s.key === "circ" ? 14 : s.key === "rect" ? 2 : 0,
                      borderTop: s.key === "line" ? `2px solid ${DARK}` : undefined,
                      marginTop: s.key === "line" ? 13 : 0,
                      clipPath:
                        s.key === "tri" ? "polygon(50% 0%, 0% 100%, 100% 100%)" :
                        s.key === "star" ? "polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)" :
                        s.key === "arrow" ? "polygon(0 40%, 60% 40%, 60% 20%, 100% 50%, 60% 80%, 60% 60%, 0 60%)" :
                        undefined,
                    }} />
                    <div style={{ fontSize: 10, color: "#555", letterSpacing: 0.4, textTransform: "uppercase" }}>{s.label}</div>
                  </button>
                ))}
              </div>
            </>
          )}

          {tool === "image" && (
            <>
              <SectionLabel>Brand Photos</SectionLabel>
              <div style={{
                marginTop: 10, fontSize: 11, color: MUTED,

                  <div key={i} style={{

          {tool === "template" && (
            <>
              <SectionLabel>Templates</SectionLabel>
              <div style={{ marginTop: 10, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>

                    <button key={t} onClick={() => setTemplate(t)} style={{

              </div>
            </>

          {tool === "colour" && (
            <>
              <SectionLabel>Brand Palette</SectionLabel>
              <div style={{ marginTop: 10, fontSize: 11, color: MUTED }}>V3.2 · 10 colours</div>
              <div style={{ marginTop: 10, display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr 1fr", gap: 6 }}>

                      aspectRatio: "1", borderRadius: 4,
                      background: c,
                      border: bg === i ? `2px solid var(--ink)` : `1px solid ${BORDER}`,

              <div style={{ marginTop: 18, paddingTop: 14, borderTop: `1px solid ${BORDER}` }}>

                  {[
                    "linear-gradient(135deg, #C5B8D8, #7A6E8A)",
                    "linear-gradient(135deg, #B8C8B0, #6E8A70)",
                    "linear-gradient(135deg, #1E1C23, #3A3744)",

                    <div key={i} style={{

                </div>
              </div>

        </div>

        {/* CANVAS COLUMN */}
        <div style={{
          display: "flex", flexDirection: "column",

            height: 48, flexShrink: 0,
            borderBottom: `1px solid ${BORDER}`,

            <span style={{ fontSize: 11, color: MUTED, letterSpacing: 0.6, textTransform: "uppercase" }}>Format</span>

              style={{
                padding: "6px 10px", border: `1px solid ${BORDER}`, borderRadius: 6,
                fontSize: 12, color: DARK, background: SURFACE, cursor: "pointer",
                appearance: "auto",
              }}

              {SOCIAL_FORMATS.map((f, i) => (
                <option key={i} value={i}>{f.platform} · {f.label} ({f.dims})</option>

            <button style={{
              padding: "6px 10px", border: `1px solid ${BORDER}`, borderRadius: 14,
              fontSize: 12, color: DARK, background: SURFACE, cursor: "pointer",

            <button style={{
              padding: "6px 10px", border: `1px solid ${BORDER}`, borderRadius: 14,
              fontSize: 12, color: DARK, background: SURFACE, cursor: "pointer",
            }}>↷ Redo</button>
          </div>

          {/* Canvas stage */}
          <div style={{
            flex: 1, overflow: "auto",
            display: "flex", alignItems: "center", justifyContent: "center",
            padding: 24,
          }}>
            <div style={{
              width: fmt.w * (zoomPct / 100),
              height: fmt.h * (zoomPct / 100),
              background: SOCIAL_BG_COLOURS[bg],
              border: `1px solid ${BORDER}`, borderRadius: 4,
              position: "relative", overflow: "hidden",
              color: bg === 2 || bg === 3 ? "white" : DARK,
              padding: 24, boxSizing: "border-box",
              display: "flex", flexDirection: "column",
              justifyContent: template === 0 ? "center" : template === 1 ? "flex-end" : template === 2 ? "flex-start" : template === 4 ? "center" : "space-between",
              alignItems: template === 4 ? "center" : "flex-start",
              textAlign: template === 4 ? "center" : "left",
              transition: "all 0.15s ease",

              {template === 2 && (
                <div style={{
                  width: "100%", height: "50%",

              <div
                onClick={() => { setSelectedElement("headline"); setTool("text"); }}

                  fontSize: Math.max(14, fmt.w * 0.07 * (zoomPct / 100)),

                }}

              <div
                onClick={() => { setSelectedElement("body"); setTool("text"); }}
                style={{
                  marginTop: 8,
                  fontSize: Math.max(10, fmt.w * 0.035 * (zoomPct / 100)),

                <div style={{
                  marginTop: 12, width: 28, height: 28, borderRadius: 14,

                    width: 32, height: 32, borderRadius: 4,
                    border: on ? `2px solid var(--ink)` : `1px solid ${BORDER}`,
                    background: SURFACE, cursor: "pointer",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 11, fontWeight: 600, color: on ? DARK : "#666",
                  }}>{p + 1}</button>

            <button onClick={() => setZoomPct(100)} style={{
              padding: "4px 10px", borderRadius: 12,
              border: `1px solid ${BORDER}`, background: SURFACE, cursor: "pointer",
              fontSize: 11, color: DARK, letterSpacing: 0.4,

          </div>
        </div>

              {["←","↔","→","≡"].map((s, i) => (
                <button key={i} style={{
                  padding: "6px 0", borderRadius: 4,
                  border: `1px solid ${BORDER}`, background: i === 0 ? "var(--ph-2)" : "white",
                  cursor: "pointer", fontSize: 12, color: DARK,
                }}>{s}</button>
              ))}
            </div>
          </div>

          <div>
            <div style={{ fontSize: 10, color: MUTED, letterSpacing: 0.8, textTransform: "uppercase", marginBottom: 6 }}>Colour</div>
            <div style={{ display: "flex", gap: 6 }}>
              {[DARK, "white", "#7A6E8A", "#6E8A70", "#8A6E68"].map((c, i) => (
                <div key={i} style={{

                  background: c, border: `1px solid ${BORDER}`,
                  cursor: "pointer",
                }} />
              ))}
            </div>
          </div>

          <div style={{ paddingTop: 12, borderTop: `1px solid ${BORDER}` }}>
            <div style={{ fontSize: 10, color: MUTED, letterSpacing: 0.8, textTransform: "uppercase", marginBottom: 6 }}>Layer</div>
            <div style={{ display: "flex", gap: 4 }}>
              {["↑", "↓", "⤒", "⤓", "⌬"].map((s, i) => (
                <button key={i} title={["Bring forward","Send backward","To front","To back","Lock"][i]} style={{
                  flex: 1, padding: "6px 0", borderRadius: 4,
                  border: `1px solid ${BORDER}`, background: SURFACE,
                  cursor: "pointer", fontSize: 12, color: "#555",
                }}>{s}</button>
              ))}
            </div>
          </div>

          <div style={{ flex: 1 }} />

          <div style={{ paddingTop: 12, borderTop: `1px solid ${BORDER}` }}>
            <div style={{ display: "flex", gap: 6 }}>
              <OutlineButton style={{ flex: 1, padding: "8px 10px", fontSize: 11 }}>Save Draft</OutlineButton>
            </div>
            <div style={{ marginTop: 8 }}>
              <DarkButton full style={{ padding: "10px 14px", fontSize: 13 }}>↑ Export Post</DarkButton>
            </div>
            <div style={{ marginTop: 8, fontSize: 10, color: MUTED, textAlign: "center", fontFamily: MONO, letterSpacing: 0.4 }}>
              PNG · JPG · MP4 · GIF
            </div>
          </div>
        </div>
      </div>
    </Shell>
  );
}

function memoryDensity(count) {
  if (count <= 4)  return { spread: 50,  height: 120, width: 180 };
  if (count <= 14) return { spread: 70,  height: 220, width: 200 };
  if (count <= 34) return { spread: 90,  height: 320, width: 240 };
  return                  { spread: 110, height: 420, width: 260 };
}

function memoryPRNG(eventIdx, i, salt) {
  const v = Math.sin(eventIdx * 999.31 + i * 73.71 + salt * 17.13) * 43758.5453;
  return v - Math.floor(v);
}

function memoryCirclePos(eventIdx, i, spread, height, size) {
  const ry = memoryPRNG(eventIdx, i, 1);
  const rx = memoryPRNG(eventIdx, i, 2);
  const yt = ry * 2 - 1;
  const y = yt * (height / 2);
  const xMax = spread * (1 - Math.pow(Math.abs(yt), 1.4));
  const x = (rx * 2 - 1) * xMax;
  return { x, y };
}

function memorySizes(L, M, S) {
  const arr = [];
  for (let i = 0; i < L; i++) arr.push(64);
  for (let i = 0; i < M; i++) arr.push(40);
  for (let i = 0; i < S; i++) arr.push(24);
  return arr
    .map((v, i) => ({ v, k: Math.sin(i * 12.91 + L * 7.3 + arr.length * 1.7) }))
    .sort((a, b) => a.k - b.k)
    .map(x => x.v);
}

const MEMORY_PAD_START = 60;
const MEMORY_PAD_END = 100;
const MEMORY_TIMELINE_H = 600;
const MEMORY_AXIS_Y = MEMORY_TIMELINE_H / 2;

const MEMORY_CLUSTERS = (() => {
  let x = MEMORY_PAD_START;
  return MEMORY_EVENTS.map((e, idx) => {
    const d = memoryDensity(e.count);
    const cx = x + d.width / 2;
    x += d.width;
    return { ...e, idx, ...d, cx };
  });
})();

const MEMORY_CANVAS_W =
  MEMORY_CLUSTERS[MEMORY_CLUSTERS.length - 1].cx +
  memoryDensity(MEMORY_CLUSTERS[MEMORY_CLUSTERS.length - 1].count).width / 2 +

function ScreenMemory({ go }) {
  const [selected, setSelected] = useState(new Set());
  const [zoom, setZoom] = useState(0.6);
  const [activeYear, setActiveYear] = useState(2022);
  const [previewPhoto, setPreviewPhoto] = useState(null);

  const scrollRef = useRef(null);
  const zoomRef = useRef(0.6);
  const clickTimerRef = useRef(null);
  useEffect(() => { zoomRef.current = zoom; }, [zoom]);

  function toggleSelect(id) {
    setSelected(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }
  function clearSelection() { setSelected(new Set()); }

  function onPhotoEvent(id) {
    if (clickTimerRef.current) {
      clearTimeout(clickTimerRef.current);
      clickTimerRef.current = null;
      // double click → select for download (no modal)
      toggleSelect(id);
      return;
    }
    clickTimerRef.current = setTimeout(() => {
      clickTimerRef.current = null;
      // single click → open full-size preview
      setPreviewPhoto(id);
    }, 230);
  }

  function scrollToYear(y) {
    setActiveYear(y);
    const evs = MEMORY_CLUSTERS.filter(c => c.year === y);
    if (!evs.length || !scrollRef.current) return;
    const z = zoomRef.current;
    const targetX = evs[0].cx * z;
    scrollRef.current.scrollTo({ left: Math.max(0, targetX - 80), behavior: "smooth" });
  }

  function onTimelineScroll() {
    if (!scrollRef.current) return;
    const sl = scrollRef.current.scrollLeft;
    const vw = scrollRef.current.clientWidth;
    const z = zoomRef.current;
    const centerX = (sl + vw / 2) / z;
    let closest = MEMORY_YEARS[0];
    let minDist = Infinity;
    MEMORY_YEARS.forEach(y => {
      const evs = MEMORY_CLUSTERS.filter(c => c.year === y);
      const c = (evs[0].cx + evs[evs.length - 1].cx) / 2;
      const d = Math.abs(centerX - c);
      if (d < minDist) { minDist = d; closest = y; }
    });
    setActiveYear(closest);
  }

  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    const handler = (e) => {
      e.preventDefault();
      if (e.ctrlKey || e.metaKey) {
        // Cursor-anchored zoom
        const rect = el.getBoundingClientRect();
        const cursorX = e.clientX - rect.left;
        const prevScale = zoomRef.current;
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        const newScale = Math.min(2.0, Math.max(0.5, +(prevScale + delta).toFixed(2)));
        if (newScale === prevScale) return;
        const canvasX = (el.scrollLeft + cursorX) / prevScale;
        setZoom(newScale);
        zoomRef.current = newScale;
        requestAnimationFrame(() => {
          el.scrollLeft = canvasX * newScale - cursorX;
        });
        return;
      }
      // Horizontal scroll: deltaX wins if larger; otherwise deltaY → horizontal
      const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
      el.scrollLeft += delta * 1.5;
    };
    el.addEventListener("wheel", handler, { passive: false });
    return () => el.removeEventListener("wheel", handler);

// =============== SCREEN 9 — ROLE SELECTION (first login) ===============
// ============================================================
// DOTS CANVAS — faithful port of Dots_Smile.html (login background)
// ============================================================
function DotsCanvas() {
  const canvasRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d', { alpha: false });

    // ── Constants (verbatim from source) ──────────────────────────────────
    const SPACING          = 9;
    const DOT_BASE         = 0.7;
    const DOT_MAX          = 2.6;
    const FLECK_RATE       = 0.05;
    const SMOOTH           = 0.12;
    const AMBIENT_STRENGTH = 0.85;
    const CLUSTER_RADIUS   = 220;
    const CLUSTER_CORE     = 95;
    const CLUSTER_STRENGTH = 1.55;
    const AURA_LAG         = 0.18;
    const TRAIL_SAMPLES    = 14;
    const TRAIL_SPACING_MS = 22;
    const RIPPLE_LIFE      = 2200;
    const RIPPLE_MAX       = 6;
    const RIPPLE_RINGS     = 4;
    const RIPPLE_RING_DELAY = 160;
    const RIPPLE_STRENGTH  = 2.6;

    // ── State ─────────────────────────────────────────────────────────────
    let W = 0, H = 0, DPR = 1;
    let cols = 0, rows = 0;
    let dots = [];
    let pointer = { x: -9999, y: -9999, active: false };
    let aura = { x: 0, y: 0, vx: 0, vy: 0, intensity: 0 };
    let trail = [];
    let ripples = [];
    let lastSampleAt = 0;
    let lastFrame = performance.now();
    let animId = null;

    // ── Hash (verbatim) ───────────────────────────────────────────────────
    function hash(n) {
      n = (n ^ 61) ^ (n >>> 16);
      n = n + (n << 3);
      n = n ^ (n >>> 4);
      n = Math.imul(n, 0x27d4eb2d);
      n = n ^ (n >>> 15);
      return ((n >>> 0) % 100000) / 100000;
    }

    // ── Resize / build grid (verbatim) ────────────────────────────────────
    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width  = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

      cols = Math.ceil(W / SPACING) + 2;
      rows = Math.ceil(H / SPACING) + 2;
      const offX = (W - (cols - 1) * SPACING) / 2;
      const offY = (H - (rows - 1) * SPACING) / 2;

      dots = new Array(cols * rows);
      let k = 0;
      for (let j = 0; j < rows; j++) {
        for (let i = 0; i < cols; i++) {
          const jx   = (hash(i * 73856093 ^ j * 19349663) - 0.5) * 1.8;
          const jy   = (hash(i * 83492791 ^ j * 50331653) - 0.5) * 1.8;
          const dens = hash(i * 17 ^ j * 311);
          dots[k++] = {
            x:         offX + i * SPACING + jx,
            y:         offY + j * SPACING + jy,
            intensity: 0,
            target:    0,
            phase:     hash(i * 12421 ^ j * 4451) * Math.PI * 2,
            speed:     0.6 + hash(i * 911 ^ j * 6151) * 0.8,
            dens,
            fleck:     hash(i * 5749 ^ j * 17191) < FLECK_RATE,
            sticky:    hash(i * 313  ^ j * 977) < 0.006
                         ? 0.10 + hash(i * 11 ^ j * 7) * 0.10
                         : 0,
          };
        }
      }

      if (!aura.x && !aura.y) {
        aura.x = W * 0.5;
        aura.y = H * 0.5;
      }
    }

    // ── Pointer events ────────────────────────────────────────────────────
    function onPointerMove(e)  { pointer.x = e.clientX; pointer.y = e.clientY; pointer.active = true; }
    function onPointerEnter(e) { pointer.x = e.clientX; pointer.y = e.clientY; pointer.active = true; }
    function onPointerLeave()  { pointer.active = false; }
    function onPointerDown(e)  {
      ripples.push({ x: e.clientX, y: e.clientY, born: performance.now() });
      if (ripples.length > RIPPLE_MAX) ripples.shift();
    }
    canvas.addEventListener('pointermove',  onPointerMove);
    canvas.addEventListener('pointerenter', onPointerEnter);
    canvas.addEventListener('pointerleave', onPointerLeave);
    canvas.addEventListener('pointerdown',  onPointerDown);

    // ── Tick (verbatim logic) ─────────────────────────────────────────────
    function tick(now) {
      animId = requestAnimationFrame(tick);

      const dt = Math.min(64, now - lastFrame);
      lastFrame = now;

      // Background
      ctx.fillStyle = '#9aa3ad';
      ctx.fillRect(0, 0, W, H);

      // Aura easing
      const lag = Math.min(1, AURA_LAG * (dt / 16.67));
      const prevX = aura.x, prevY = aura.y;
      if (pointer.active) {
        aura.x += (pointer.x - aura.x) * lag;
        aura.y += (pointer.y - aura.y) * lag;
        aura.intensity += (1 - aura.intensity) * Math.min(1, 0.08 * (dt / 16.67));
      } else {
        aura.intensity += (0 - aura.intensity) * Math.min(1, 0.025 * (dt / 16.67));
      }
      aura.vx = aura.x - prevX;
      aura.vy = aura.y - prevY;

      // Trail sampling
      if (now - lastSampleAt > TRAIL_SPACING_MS) {
        trail.unshift({ x: aura.x, y: aura.y, born: now });
        if (trail.length > TRAIL_SAMPLES) trail.length = TRAIL_SAMPLES;
        lastSampleAt = now;
      }

      // Ripple rings
      const liveRipples = [];
      const maxAge = RIPPLE_LIFE + RIPPLE_RING_DELAY * (RIPPLE_RINGS - 1);
      for (const r of ripples) {
        const clickAge = now - r.born;
        if (clickAge >= maxAge) continue;
        for (let ri = 0; ri < RIPPLE_RINGS; ri++) {
          const age = clickAge - ri * RIPPLE_RING_DELAY;
          if (age < 0 || age >= RIPPLE_LIFE) continue;
          const t          = age / RIPPLE_LIFE;
          const eased      = 1 - (1 - t) * (1 - t);
          const radius     = eased * Math.max(W, H) * 0.78;
          const thickness  = 18 + t * 28;
          const ringFalloff = 1 - ri / RIPPLE_RINGS * 0.40;
          const strength   = (1 - t) * (1 - t * 0.7) * RIPPLE_STRENGTH * ringFalloff;
          liveRipples.push({ x: r.x, y: r.y, radius, thickness, strength });
        }
      }
      ripples = ripples.filter(r => now - r.born < maxAge);

      const followStep   = Math.min(1, SMOOTH * (dt / 16.67));
      const cullRadiusSq = (CLUSTER_RADIUS * 1.8) * (CLUSTER_RADIUS * 1.8);
      const coreFalloffSq = CLUSTER_CORE   * CLUSTER_CORE;
      const haloFalloffSq = CLUSTER_RADIUS * CLUSTER_RADIUS;

      // Per-dot loop (verbatim)
      for (let k = 0; k < dots.length; k++) {
        const d = dots[k];
        if (d.x < -2 || d.x > W + 2 || d.y < -2 || d.y > H + 2) continue;

        const dense = d.dens;
        let target = 0;
        if (d.sticky > 0) target = d.sticky;

        // Ambient scatter
        {
          const nx = (d.x / W) * 2 - 1;
          const ny = (d.y / H) * 2 - 1;
          const ar = W / H;

          const c1x =  0.70 * Math.sin(now * 0.00021);
          const c1y =  0.55 * Math.cos(now * 0.00029 + 0.6);
          const c2x = -0.75 * Math.sin(now * 0.00033 + 1.7);
          const c2y =  0.60 * Math.cos(now * 0.00025 + 2.4);
          const c3x =  0.20 * Math.sin(now * 0.00018 + 3.1);
          const c3y = -0.65 * Math.cos(now * 0.00031 + 0.9);
          const c4x = -0.45 * Math.sin(now * 0.00027 + 4.3);
          const c4y = -0.40 * Math.cos(now * 0.00023 + 2.0);

          const dx1 = (nx - c1x) * ar, dy1 = ny - c1y;
          const dx2 = (nx - c2x) * ar, dy2 = ny - c2y;
          const dx3 = (nx - c3x) * ar, dy3 = ny - c3y;
          const dx4 = (nx - c4x) * ar, dy4 = ny - c4y;

          const blob1 = 0.95 * Math.exp(-(dx1*dx1 + dy1*dy1) / 0.60);
          const blob2 = 0.80 * Math.exp(-(dx2*dx2 + dy2*dy2) / 0.85);
          const blob3 = 0.70 * Math.exp(-(dx3*dx3 + dy3*dy3) / 0.55);
          const blob4 = 0.65 * Math.exp(-(dx4*dx4 + dy4*dy4) / 0.95);

          const grain  = 0.5 + 0.5 * Math.sin(nx * 6.5 + Math.cos(ny * 5.8 + now * 0.00075) * 2.2 + now * 0.0004);
          const grain2 = 0.5 + 0.5 * Math.sin(ny * 7.2 - Math.cos(nx * 4.9 - now * 0.0006)  * 1.9 - now * 0.00055);
          const noise  = grain * grain2;
          const wide   = 0.5 + 0.5 * Math.sin(nx * 2.1 + now * 0.00018) *
                                Math.cos(ny * 1.8 - now * 0.00021);

          const ambient = ((blob1 + blob2 + blob3 + blob4) * (0.35 + 0.65 * noise) + noise * 0.18 + wide * 0.12) * AMBIENT_STRENGTH;
          const aThresh = 0.14 + (1 - dense) * 0.38;
          if (ambient > aThresh) target += (ambient - aThresh) * 1.25;
        }

        // Cursor cluster + trail
        let bloom = 0;
        const cdx = d.x - aura.x;
        const cdy = d.y - aura.y;
        const cdsq = cdx * cdx + cdy * cdy;

        if (cdsq < cullRadiusSq) {
          const halo = Math.exp(-cdsq / haloFalloffSq);
          const core = Math.exp(-cdsq / coreFalloffSq);
          bloom += halo * 0.55 + core * 1.45;
        }

        for (let ti = 0; ti < trail.length; ti++) {
          const tr  = trail[ti];
          const age = (ti + 1) / trail.length;
          const w   = (1 - age) * (1 - age);
          const tdx = d.x - tr.x;
          const tdy = d.y - tr.y;
          const tdsq = tdx * tdx + tdy * tdy;
          if (tdsq > cullRadiusSq) continue;
          const halo = Math.exp(-tdsq / (haloFalloffSq * (1 - age * 0.4)));
          const core = Math.exp(-tdsq / (coreFalloffSq * (1 - age * 0.55)));
          bloom += (halo * 0.35 + core * 0.85) * w;
        }

        bloom *= CLUSTER_STRENGTH * aura.intensity;

        // Ripples
        let rippleAdd = 0;
        for (let ri = 0; ri < liveRipples.length; ri++) {
          const r   = liveRipples[ri];
          const rdx = d.x - r.x;
          const rdy = d.y - r.y;
          const rd  = Math.sqrt(rdx * rdx + rdy * rdy);
          const off = Math.abs(rd - r.radius);
          if (off < r.thickness * 1.9) {
            rippleAdd += Math.exp(-(off * off) / (r.thickness * r.thickness * 0.6)) * r.strength;
          }
        }
        if (rippleAdd > 0) {
          const rThresh = 0.025 + (1 - dense) * 0.22;
          if (rippleAdd > rThresh) target += (rippleAdd - rThresh) * 1.8;
        }

        // Density gating
        if (bloom > 0) {
          const rd     = Math.sqrt(cdsq);
          const inCore = 1 - Math.min(1, rd / (CLUSTER_RADIUS * 1.6));
          const thresh = (0.05 + (1 - inCore) * 0.95) * (0.4 + dense * 1.2);
          if (bloom > thresh) target += (bloom - thresh) * 1.6;
        }

        // Twinkle
        target *= 0.85 + 0.15 * Math.sin(now * 0.002 * d.speed + d.phase);
        if (target > 1.5) target = 1.5;
        if (target < 0)   target = 0;

        d.target    = target;
        d.intensity += (target - d.intensity) * followStep;

        const v = d.intensity;
        if (v < 0.03) continue;

        const size = DOT_BASE + Math.min(1, v) * (DOT_MAX - DOT_BASE);
        const a    = Math.min(1, v);

        ctx.fillStyle = d.fleck
          ? `rgba(245,250,200,${(a * 0.92).toFixed(3)})`
          : `rgba(232,254,103,${a.toFixed(3)})`;
        ctx.fillRect(d.x - size * 0.5, d.y - size * 0.5, size, size);
      }
    }

    // Boot
    resize();
    window.addEventListener('resize', resize);
    animId = requestAnimationFrame(tick);

    return () => {
      cancelAnimationFrame(animId);
      window.removeEventListener('resize', resize);
      canvas.removeEventListener('pointermove',  onPointerMove);
      canvas.removeEventListener('pointerenter', onPointerEnter);
      canvas.removeEventListener('pointerleave', onPointerLeave);
      canvas.removeEventListener('pointerdown',  onPointerDown);
    };
  }, []);

  return (
    <canvas
      ref={canvasRef}
      style={{
        position: 'absolute',
        top: 0, left: 0,
        width: '100%', height: '100%',
        display: 'block',
        zIndex: 0,
        cursor: 'crosshair',
      }}
    />
  );
}

const ROLE_OPTIONS = [
  { key: "designer",  label: "designer" },

const LOGIN_CTA = "type your name";

function ScreenRole({ onChoose, onSkip }) {
  const { setUserName } = useContext(AppContext);
  const [localName, setLocalName] = useState("");
  const [hoveredRole, setHoveredRole] = useState(null);
  const [selectedRole, setSelectedRole] = useState(null);
  const [typed, setTyped] = useState(0);

  const isEmpty = localName === "";

  // Typewriter: animate letters in while field is empty; skip to end when user types
  useEffect(() => {
    if (!isEmpty) { setTyped(LOGIN_CTA.length); return; }
    setTyped(0);
    let i = 0;
    const id = setInterval(() => { i++; setTyped(i); if (i >= LOGIN_CTA.length) clearInterval(id); }, 60);
    return () => clearInterval(id);
  }, [isEmpty]);

  const nameEntered = localName.trim().length > 0;

  function handleChoose(key) {
    if (localName.trim()) setUserName(localName.trim());
    setSelectedRole(key);
    onChoose(key);
  }

  return (
    <div style={{
      minHeight: "100vh",
      width: "100%",
      position: "relative",
      overflow: "hidden",
      background: "#9aa3ad",
    }}>

      {/* ── DOTS CANVAS — behind everything ── */}
      <DotsCanvas />

      {/* ── WORDMARK — top-left, small ── */}
      <div style={{
        position: "absolute",
        top: 28, left: 36,
        zIndex: 2,
        fontFamily: "'Libre Caslon Display', Georgia, serif",
        fontSize: 22,
        fontWeight: 400,
        color: "rgba(26,31,38,0.75)",
        letterSpacing: -0.3,
        lineHeight: 1,
        userSelect: "none",
      }}>
        Brand HQ
      </div>

      {/* ── CENTRE CONTENT ── */}
      <div style={{
        position: "absolute",
        inset: 0,
        zIndex: 2,
        display: "flex",
        flexDirection: "column",
        alignItems: "center",
        justifyContent: "center",
      }}>

        {/* Name input — styled like home screen search card */}
        <div style={{
          position: "relative",
          marginBottom: nameEntered ? 64 : 0,
          transition: "margin-bottom 0.5s cubic-bezier(0.22,1,0.36,1)",
        }}>
          <input
            type="text"
            value={localName}
            onChange={e => setLocalName(e.target.value)}
            autoFocus
            style={{
              width: 440,
              padding: "14px 20px",
              borderRadius: 14,
              border: "1px solid rgba(0,0,0,0.10)",
              background: "rgba(255,255,255,0.96)",
              fontSize: 17,
              fontFamily: "'Inter', sans-serif",
              fontWeight: 400,
              color: "rgba(26,31,38,0.88)",
              textAlign: "center",
              outline: "none",
              boxShadow: "0 4px 24px rgba(0,0,0,0.10)",
              caretColor: "var(--ink)",
              transition: "border-color var(--duration-fast)",
            }}
            onFocus={e => e.currentTarget.style.borderColor = "rgba(26,31,38,0.35)"}
            onBlur={e => e.currentTarget.style.borderColor = "rgba(0,0,0,0.10)"}
          />
          {/* Animated "type your name" CTA — visible only when field is empty */}
          {isEmpty && (
            <div style={{
              position: "absolute", inset: 0,
              display: "flex", alignItems: "center", justifyContent: "center",
              pointerEvents: "none",
            }}>
              {LOGIN_CTA.split("").slice(0, typed).map((ch, i) => (
                <span
                  key={i}
                  className="cta-letter"
                  style={{ animationDelay: `${i * 0.035}s` }}
                >{ch === " " ? " " : ch}</span>
              ))}
            </div>
          )}
        </div>

        {/* Role words — appear when name is typed */}
        <div style={{
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          gap: 48,
          flexWrap: "nowrap",
          opacity: nameEntered ? 1 : 0,
          transform: nameEntered ? "translateY(0)" : "translateY(20px)",
          filter: nameEntered ? "blur(0px)" : "blur(8px)",
          transition: "opacity 0.6s cubic-bezier(0.22,1,0.36,1), transform 0.6s cubic-bezier(0.22,1,0.36,1), filter 0.6s ease",
          pointerEvents: nameEntered ? "auto" : "none",
        }}>
          {ROLE_OPTIONS.map((r, i) => {
            const isHovered = hoveredRole === r.key;
            const isSelected = selectedRole === r.key;
            const isActive = isHovered || isSelected;

            return (
              <span
                key={r.key}
                onMouseEnter={() => setHoveredRole(r.key)}
                onMouseLeave={() => setHoveredRole(null)}
                onClick={() => handleChoose(r.key)}
                style={{
                  fontFamily: "'Libre Caslon Display', Georgia, serif",
                  fontSize: 56,
                  fontWeight: 400,
                  lineHeight: 1.1,
                  letterSpacing: -1,
                  cursor: "pointer",
                  userSelect: "none",
                  display: "inline-block",
                  color: "var(--ink)",
                  WebkitTextStroke: isActive ? `8px var(--accent)` : "6px rgba(255,255,255,0.70)",
                  paintOrder: "stroke fill",
                  animation: nameEntered
                    ? `roleWordIn 0.5s var(--ease-spring) ${i * 0.08}s both`
                    : "none",
                  transform: isActive ? "scale(1.04)" : "scale(1)",
                  transition: `transform 0.2s var(--ease-spring)`,
                }}
              >
                {r.label}
              </span>
            );
          })}
        </div>
      </div>

      {/* ── SKIP — bottom centre, only once name is typed ── */}
      <button
        onClick={onSkip}
        style={{
          position: "absolute",
          bottom: 28,
          left: "50%",
          transform: "translateX(-50%)",
          zIndex: 2,
          background: "none",
          border: "none",
          cursor: nameEntered ? "pointer" : "default",
          fontSize: 12,
          fontFamily: "'Inter', sans-serif",
          letterSpacing: "0.08em",
          color: "rgba(26,31,38,0.35)",
          opacity: nameEntered ? 1 : 0,
          pointerEvents: nameEntered ? "auto" : "none",
          transition: `opacity 0.5s var(--ease-smooth), color var(--duration-fast)`,
        }}
        onMouseEnter={e => { if (nameEntered) e.currentTarget.style.opacity = "0.7"; }}
        onMouseLeave={e => { e.currentTarget.style.opacity = nameEntered ? "1" : "0"; }}
      >
        skip for now
      </button>

    </div>
  );
}

function searchTools(q) {
  const query = q.trim().toLowerCase();
  if (!query) {
    return ["Team Photos","Photo Archive","Brand Library","Email Signature"]
      .map(l => SEARCH_INDEX.find(s => s.label === l));
  }
  return SEARCH_INDEX
    .map(s => {
      const label = s.label.toLowerCase();
      let score = 0;
      if (label === query) score = 100;
      else if (label.startsWith(query)) score = 70;
      else if (label.includes(query)) score = 50;
      else if (s.keywords.some(k => k.startsWith(query))) score = 35;
      else if (s.keywords.some(k => k.includes(query))) score = 20;
      return { s, score };
    })
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .map(x => x.s);
}

// ===== Widget tile (handles click-vs-hold discrimination) =====
function HomeWidgetTile({ widgetKey, widget, go, index = 0, justAdded, isDragged, isAnyDragging, onDragStart }) {
  const [hover, setHover] = useState(false);
  const stateRef = useRef({ phase: "idle", startX: 0, startY: 0, timer: null });

  function onPointerDown(e) {
    if (e.button !== 0) return;
    if (isAnyDragging) return;
    e.preventDefault();
    const rect = e.currentTarget.getBoundingClientRect();
    const startX = e.clientX, startY = e.clientY;
    stateRef.current = { phase: "pressed", startX, startY, timer: null };

    stateRef.current.timer = setTimeout(() => {
      if (stateRef.current.phase === "pressed") {
        stateRef.current.phase = "dragging";
        onDragStart(widgetKey, rect, startX, startY);
      }
    }, 160);

    function onMove(ev) {
      const dx = ev.clientX - stateRef.current.startX;
      const dy = ev.clientY - stateRef.current.startY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (stateRef.current.phase === "pressed" && dist > 5) {
        clearTimeout(stateRef.current.timer);
        stateRef.current.phase = "dragging";
        onDragStart(widgetKey, rect, stateRef.current.startX, stateRef.current.startY);
      }
    }

    function onUp(ev) {
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      if (stateRef.current.timer) clearTimeout(stateRef.current.timer);
      if (stateRef.current.phase === "pressed") {
        if (widget.working && widget.to) go(widget.to);
      }
      stateRef.current.phase = "idle";
    }

    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  }

  return (
    <div
      data-widget-key={widgetKey}
      onPointerDown={onPointerDown}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        position: "relative",
        background: isDragged ? "rgba(255,255,255,0.4)" : "var(--surface)",
        border: isDragged ? `1px dashed var(--border)` : `1px solid var(--border)`,
        borderRadius: 14,
        padding: 20,
        height: 260,
        display: "flex", flexDirection: "column",
        cursor: widget.working ? "pointer" : "grab",
        userSelect: "none",
        opacity: isDragged ? 0.35 : widget.working ? 1 : 0.62,
        transform: isDragged
          ? "translateY(0)"
          : hover
            ? (widget.working ? "translateY(-4px) scale(1.015)" : "translateY(-2px)")
            : "translateY(0) scale(1)",
        transition: "transform 0.26s cubic-bezier(0.22,1,0.36,1), opacity 0.15s, background 0.15s, border-color 0.15s",
        touchAction: "none",
        animation: isDragged
          ? "none"
          : justAdded
            ? `widgetAddIn 0.62s cubic-bezier(0.34,1.56,0.64,1) both`
            : `tileIn 0.5s cubic-bezier(0.22,1,0.36,1) backwards`,
        animationDelay: justAdded ? "0ms" : `${Math.min(index, 11) * 45}ms`,
      }}
      onMouseOver={e => { if (!isDragged) e.currentTarget.style.borderColor = "var(--ink)"; }}
      onMouseOut={e => { e.currentTarget.style.borderColor = "var(--border)"; }}
    >
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        marginBottom: 14,
      }}>
        <div style={{
          fontFamily: "'Inter', sans-serif", fontSize: 13, fontWeight: 500, color: "var(--ink)",
          letterSpacing: 0, lineHeight: 1,
        }}>{widget.title}</div>
        {!widget.working && (
          <span style={{
            fontSize: 9, fontWeight: 600, letterSpacing: 0.8,
            color: "var(--muted)", background: "var(--faint)",
            border: `1px solid var(--border)`,
            padding: "2px 7px", borderRadius: 10, textTransform: "uppercase",
          }}>Soon</span>
        )}
      </div>
      <div style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column" }}>
        {widget.render(go)}
      </div>
    </div>
  );
}
