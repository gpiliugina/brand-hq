<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Archive — Wireframe Prototype</title>
<meta name="viewport" content="width=1280" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #ECEDEF;
    --surface: #FFFFFF;
    --ink: #2F3A45;
    --solid: #141414;
    --muted: #99A3AD;
    --border: #DDE2E7;
    --faint: #F5F5F6;
    --accent: #E8FE67;
    --accent-bubble: rgba(232,254,103,0.82);
    --accent-glow: rgba(232,254,103,0.18);
    --accent-subtle: rgba(232,254,103,0.08);
    --tile-border: rgba(0,0,0,0.06);
    --ph-1: #FAFAFA; --ph-2: #F2F2F2; --ph-3: #E8E8E8; --ph-4: #D4D4D4;
    --line: rgba(0,0,0,0.06);
    --grid-dot: rgba(0,0,0,0.07);
    --ok-bg: #E1E8DC; --ok-fg: #3a6a3a;
    --bad-bg: #F4DDDD; --bad-fg: #7a5050;
    --sp-a: #EEF0F3; --sp-b: #D8DCE1; --sp-c: #B8BEC5; --sp-d: #99A3AD; --sp-e: #6B7680;
    /* ── Typography ── */
    --font-display: 'Instrument Serif', Georgia, serif;
    --font-ui:      'Inter', system-ui, sans-serif;
    --font-mono:    'SF Mono', 'JetBrains Mono', 'Menlo', 'Consolas', monospace;

    --text-body:    13px;
    --text-caption: 11px;
    --text-small:   10px;
    --text-label:   10px;
    --text-h1:      88px;
    --text-h2:      24px;
    --text-h3:      18px;
    --text-stat:    72px;
    --font-size-input: 22px;   /* semantic: large onboarding name field */

    --weight-regular:  400;
    --weight-medium:   500;
    --weight-semibold: 600;

    --lh-base:   1.4;
    --ls-hero:   -0.03em;
    --ls-label:  0.08em;
    --ls-badge:  0.8px;

    /* ── Grid pattern ── */
    --grid-dot-size: 1px;
    --grid-bg-size: 28px 28px;

    /* ── Z-index scale ── */
    --z-0: 0;
    --z-2: 2;
    --z-3: 3;
    --z-4: 4;
    --z-overlay: 999;

    /* ── Spacing ── */
    --space-2:  2px;
    --space-4:  4px;
    --space-6:  6px;
    --space-8:  8px;
    --space-10: 10px;
    --space-12: 12px;
    --space-14: 14px;
    --space-16: 16px;
    --space-20: 20px;
    --space-24: 24px;
    --space-28: 28px;
    --space-32: 32px;
    --space-40: 40px;
    --space-48: 48px;
    --space-64: 64px;

    /* ── Radius ── */
    --radius-2:    2px;
    --radius-4:    4px;
    --radius-6:    6px;
    --radius-8:    8px;
    --radius-10:   10px;
    --radius-12:   12px;
    --radius-14:   14px;
    --radius-16:   16px;
    --radius-full: 50%;
    --radius-input: 18px;   /* semantic: large onboarding name field */

    /* ── Motion ── */
    --dur-fast:   0.12s;
    --dur-base:   0.22s;
    --dur-slow:   0.30s;
    --dur-screen: 0.60s;
    --ease-smooth:  cubic-bezier(0.22, 1, 0.36, 1);
    --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-in-out:  cubic-bezier(0.83, 0, 0.17, 1);
    --ease-out:     ease;

    /* ── Shadows ── */
    --shadow-card:   0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-input:  0 4px 24px rgba(0,0,0,0.10);
    --shadow-search: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-drop:   0 8px 24px rgba(0,0,0,0.06);
    --shadow-lift:   0 8px 24px rgba(0,0,0,0.10);
    --shadow-name:   0 10px 40px rgba(0,0,0,0.05);

    /* ── Photo treatment ── */
    --photo-hover-scale: 1.06;
    --photo-press-scale: 0.95;
    --photo-transition: transform var(--dur-slow) var(--ease-spring);

    /* ── Sphere treatment ── */
    --sphere-shadow:
      inset -5px -5px 12px rgba(0, 0, 0, 0.20),
      inset 4px 4px 10px rgba(255, 255, 255, 0.60);
    --sphere-spec-gradient: radial-gradient(circle, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0) 100%);
    --sphere-depth-gradient: radial-gradient(circle, rgba(0, 0, 0, 0.18) 0%, rgba(0, 0, 0, 0) 100%);
    --glass-fallback: var(--sp-c);
    --sphere-selected-glow:   rgba(232,254,103,0.20);
    --sphere-selected-glow-0: rgba(232,254,103,0);

    /* ── Placeholder / CTA text ── */
    --placeholder: #9AA0A6;

    color-scheme: light;
  }
  /* dark theme removed — app is light-only */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; width: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background-color: var(--bg);
    background-image: radial-gradient(circle, var(--grid-dot) var(--grid-dot-size), transparent var(--grid-dot-size));
    background-size: var(--grid-bg-size);
    background-attachment: fixed;
    color: var(--ink);
    font-size: var(--text-body);
    line-height: var(--lh-base);
    -webkit-font-smoothing: antialiased;
    min-width: 1280px;
    transition: background-color var(--dur-slow) var(--ease-out), color var(--dur-slow) var(--ease-out);
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  input { font-family: inherit; outline: none; }
  a { color: inherit; text-decoration: none; cursor: pointer; }
  ::placeholder { color: var(--placeholder); }

  @keyframes chipIdleFloat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-5px); }
  }
  @keyframes faviconPulse {
    0% { transform: scale(1); }
    40% { transform: scale(0.94); }
    100% { transform: scale(1); }
  }
  @keyframes lineDraw {
    from { stroke-dashoffset: 200; }
    to { stroke-dashoffset: 0; }
  }
  @keyframes screenIn {
    from { opacity: 0; transform: translateY(18px) scale(0.99); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes heroIn {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes tileIn {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes widgetAddIn {
    0%   { opacity: 0; transform: scale(0.5); }
    60%  { opacity: 1; transform: scale(1.04); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes popIn {
    0%   { opacity: 0; transform: scale(0.75); }
    65%  { opacity: 1; transform: scale(1.06); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes bubbleIn {
    0%   { opacity: 0; transform: scale(0); }
    65%  { opacity: 1; transform: scale(1.08); }
    100% { opacity: 1; transform: scale(1); }
  }
  .lift-hover {
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s ease;
  }
  .lift-hover:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.10); }
  .press-fx { transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1); }
  .press-fx:active { transform: scale(0.93); }

  /* Photo circle — flat treatment */
  .photo-liquid {
    border-radius: var(--radius-full);
    position: relative;
    overflow: hidden;
    display: inline-block;
    transition: transform var(--dur-slow) var(--ease-spring);
  }
  .photo-liquid:hover  { transform: scale(1.06); }
  .photo-liquid:active { transform: scale(0.95); }

  .photo-liquid img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center top;
    display: block; border-radius: var(--radius-full);
    pointer-events: none;
  }

  /* Overlay divs are kept in DOM but inert — no backgrounds, no shadows */
  .photo-liquid-spec,
  .photo-liquid-rim,
  .photo-liquid-depth { display: none; }

  .photo-liquid-selected { box-shadow: 0 0 0 3px var(--accent); }
  .photo-liquid-strong,
  .photo-liquid-subtle  { /* no filter */ }

  /* Ghost atmospheric type */
  .ghost {
    font-family: 'Instrument Serif', Georgia, serif;
    position: absolute; pointer-events: none; user-select: none;
    color: var(--ink); opacity: 0.04; line-height: 1;
    z-index: var(--z-0); white-space: nowrap; letter-spacing: var(--ls-hero);
  }

  /* Sphere animations */
  @keyframes sphereIn {
    from { opacity: 0; transform: scale(0.7); filter: blur(4px); }
    to   { opacity: 1; transform: scale(1);   filter: blur(0); }
  }
  @keyframes sphereBounce {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.18); }
    70%  { transform: scale(0.92); }
    100% { transform: scale(1); }
  }
  @keyframes sphereFloat {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    33%       { transform: translateY(-6px) rotate(1deg); }
    66%       { transform: translateY(-3px) rotate(-0.5deg); }
  }
  @keyframes heroIn {
    from { opacity: 0; transform: translateY(20px); filter: blur(6px); }
    to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateX(-16px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes bubbleMerge {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes markerReveal {
    from { background-size: 0% 100%; }
    to   { background-size: 100% 100%; }
  }
  @keyframes dotPop {
    0%  { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.4); }
    100%{ transform: scale(1); opacity: 1; }
  }
  @keyframes screenIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes floatGhost {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-10px); }
  }

.s-btn {
    transition: opacity var(--dur-fast) var(--ease-out), transform var(--dur-fast) var(--ease-out);
    cursor: pointer;
  }
  .s-btn:hover  { opacity: 0.82; }
  .s-btn:active { transform: scale(0.94); }

  /* Bubble float animations — each unique */
  @keyframes bubbleFloat1 {
    0%, 100% { transform: translate(0px, 0px) rotate(0deg); }
    25%       { transform: translate(8px, -18px) rotate(0.6deg); }
    50%       { transform: translate(-6px, -28px) rotate(-0.4deg); }
    75%       { transform: translate(10px, -14px) rotate(0.3deg); }
  }
  @keyframes bubbleFloat2 {
    0%, 100% { transform: translate(0px, 0px) rotate(0deg); }
    30%       { transform: translate(-10px, -22px) rotate(-0.5deg); }
    60%       { transform: translate(8px, -30px) rotate(0.4deg); }
    80%       { transform: translate(-4px, -16px) rotate(-0.2deg); }
  }
  @keyframes bubbleFloat3 {
    0%, 100% { transform: translate(0px, 0px) rotate(0deg); }
    20%       { transform: translate(12px, -12px) rotate(0.7deg); }
    55%       { transform: translate(-8px, -24px) rotate(-0.3deg); }
    85%       { transform: translate(6px, -18px) rotate(0.5deg); }
  }
  @keyframes bubbleFloat4 {
    0%, 100% { transform: translate(0px, 0px) rotate(0deg); }
    35%       { transform: translate(-6px, -20px) rotate(-0.6deg); }
    65%       { transform: translate(10px, -26px) rotate(0.4deg); }
    90%       { transform: translate(-8px, -12px) rotate(-0.3deg); }
  }

  /* Bubble appear */
  @keyframes liquidBubbleIn {
    0%   { opacity: 0; transform: scale(0.6) translateY(40px); filter: blur(12px); }
    60%  { filter: blur(0px); }
    80%  { transform: scale(1.05) translateY(-4px); }
    100% { opacity: 1; transform: scale(1) translateY(0px); }
  }

  /* Name input appear */
  @keyframes inputReveal {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Wordmark reveal */
  @keyframes wordmarkIn {
    from { opacity: 0; letter-spacing: 0.1em; filter: blur(8px); }
    to   { opacity: 1; letter-spacing: -0.04em; filter: blur(0); }
  }

  /* Sign-in name field — plain white, rounded, no stroke */
  .name-field {
    background: var(--surface);
    border: none;
    outline: none;
    border-radius: var(--radius-input);
    padding: var(--space-20) var(--space-28);
    width: 440px;
    font-size: var(--font-size-input);
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    text-align: center;
    caret-color: var(--ink);
    box-shadow: var(--shadow-name);
  }
  .name-field::placeholder { color: transparent; }

  /* Typewriter call-to-action overlay */
  @keyframes ctaLetterIn {
    from { filter: blur(8px); opacity: 0; transform: translateY(3px); }
    to   { filter: blur(0);   opacity: 1; transform: translateY(0); }
  }
  .cta-letter {
    display: inline-block;
    white-space: pre;
    color: var(--placeholder);
    animation: ctaLetterIn 0.42s ease backwards;
  }

  /* Required-name shake */
  @keyframes nameShake {
    0%, 100% { transform: translateX(0); }
    18%       { transform: translateX(-9px); }
    38%       { transform: translateX(8px); }
    58%       { transform: translateX(-6px); }
    78%       { transform: translateX(4px); }
  }

  /* Floating role words */
  .role-word {
    font-family: 'Instrument Serif', Georgia, serif;
    font-weight: var(--weight-regular);
    color: var(--ink);
    cursor: pointer;
    line-height: 1;
    letter-spacing: -1px;
    -webkit-text-stroke-width: 5px;
    -webkit-text-stroke-color: var(--surface);
    paint-order: stroke fill;
    -webkit-text-stroke-linejoin: round;
    text-shadow: none;
    transition:
      transform var(--dur-slow) var(--ease-spring),
      -webkit-text-stroke-color var(--dur-base) var(--ease-out),
      opacity var(--dur-slow) var(--ease-out);
    user-select: none;
  }
  .role-word:hover {
    transform: scale(1.05);
    -webkit-text-stroke-color: var(--accent);
  }
  .role-word.is-picked {
    transform: scale(1.22);
    -webkit-text-stroke-width: 5px;
    -webkit-text-stroke-color: var(--accent);
    text-shadow: none;
  }

  /* Circle-mask screen transition */
  .circle-reveal {
    position: fixed;
    inset: 0;
    z-index: var(--z-overlay);
    pointer-events: none;
    background: var(--bg);
    background-image: radial-gradient(circle, var(--grid-dot) var(--grid-dot-size), transparent var(--grid-dot-size));
    background-size: var(--grid-bg-size);
    transition: clip-path var(--dur-screen) var(--ease-in-out);
  }

  /* Bubble content (sits above sphere overlays) */
  .bubble-content {
    position: relative;
    z-index: var(--z-4);
    text-align: center;
    padding: var(--space-16);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }

  @keyframes roleWordIn {
    from {
      opacity: 0;
      transform: translateY(18px) scale(0.95);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  /* ── Widget preview animations ── */
  @keyframes waveDrift0 { from { transform: translateX(0);     } to { transform: translateX(-120px); } }
  @keyframes waveDrift1 { from { transform: translateX(-20px); } to { transform: translateX(-140px); } }
  @keyframes waveDrift2 { from { transform: translateX(-10px); } to { transform: translateX(-150px); } }
  @keyframes waveDrift3 { from { transform: translateX(-35px); } to { transform: translateX(-105px); } }
  @keyframes waveDrift4 { from { transform: translateX(-5px);  } to { transform: translateX(-165px); } }

  @keyframes barBreath0 { 0%,100% { transform: scaleY(1);    } 50% { transform: scaleY(1.7);  } }
  @keyframes barBreath1 { 0%,100% { transform: scaleY(0.75); } 50% { transform: scaleY(1.4);  } }
  @keyframes barBreath2 { 0%,100% { transform: scaleY(1.2);  } 50% { transform: scaleY(0.65); } }
  @keyframes barBreath3 { 0%,100% { transform: scaleY(0.9);  } 50% { transform: scaleY(1.55); } }

  @keyframes ellipseY0 { 0%,100% { transform: scaleY(1);    } 50% { transform: scaleY(1.25); } }
  @keyframes ellipseY1 { 0%,100% { transform: scaleY(0.82); } 50% { transform: scaleY(1.15); } }
  @keyframes ellipseY2 { 0%,100% { transform: scaleY(1.1);  } 50% { transform: scaleY(0.78); } }

  @keyframes modShapeIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  .wp-shapes { transition: transform 0.2s ease; }

  input, textarea, select { outline: none !important; box-shadow: none !important; }
  input:focus, textarea:focus, select:focus { outline: none !important; box-shadow: none !important; }

</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useRef, useEffect, useContext, createContext, Fragment } = React;

const AppContext = createContext({
  role: null,
  changeRole: () => {},
  resetOnboarding: () => {},
  openTabs: [],
  closeTab: () => {},
  theme: "light",
  toggleTheme: () => {},
  userName: "",
  setUserName: () => {},
});

const ACCENT = "var(--accent)";
const DARK = "var(--ink)";          // primary text / foreground (themable)
const SOLID = "var(--solid)";       // strong filled buttons / avatars
const SURFACE = "var(--surface)";   // card / panel background
const BORDER = "var(--border)";
const BG = "var(--bg)";
const MUTED = "var(--muted)";
const FAINT = "var(--faint)";
const HOME_BG = "var(--bg)";
const CONTENT_MAX = "100%"; // full-width content across every page
const HOME_TILE_BORDER = "var(--tile-border)";
const HOME_SERIF = "'Instrument Serif', Georgia, serif";

// =============== TOOLS (every working feature) ===============
const TOOLS = [
  { key: "library",    label: "Brand Library",   to: "library" },
  { key: "files",      label: "Team Photos",     to: "files" },
  { key: "memory",     label: "Photo Archive",   to: "memory" },
  { key: "signature",  label: "Email Signature", to: "signature" },
  { key: "social",     label: "Social Post",     to: "social" },
  { key: "creator",    label: "Brand Checker",   to: "creator" },
  { key: "onboarding", label: "Onboarding",      to: "onboarding" },
];
function toolForScreen(s) {
  if (s === "files" || s === "photo") return "files";
  if (TOOLS.some(t => t.key === s)) return s;
  return null;
}

// =============== UNIVERSAL TOP BAR (favicon · widgets menu · profile) ===============
function UniversalTopBar({ activeScreen, go }) {
  const { role, changeRole, resetOnboarding, openTabs, closeTab, theme, toggleTheme, userName } = useContext(AppContext);
  const userInitial = userName && userName.trim().length > 0
    ? userName.trim()[0]
    : "?";
  const profileEmail = role
    ? `${role}@brandhq.com`
    : (userName && userName.trim()
        ? `${userName.trim().toLowerCase().replace(/\s+/g, ".")}@brandhq.com`
        : "guest@brandhq.com");
  const [profileOpen, setProfileOpen] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [faviconPressed, setFaviconPressed] = useState(false);
  const profileRef = useRef(null);
  const menuRef = useRef(null);

  const isHome = activeScreen === "home";
  const currentTool = toolForScreen(activeScreen);

  useEffect(() => {
    function onDocDown(e) {
      if (profileOpen && profileRef.current && !profileRef.current.contains(e.target)) setProfileOpen(false);
      if (menuOpen && menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false);
    }
    window.addEventListener("mousedown", onDocDown);
    return () => window.removeEventListener("mousedown", onDocDown);
  }, [profileOpen, menuOpen]);

  function onFaviconClick() {
    setFaviconPressed(true);
    setTimeout(() => setFaviconPressed(false), 300);
    if (!isHome) go("home");
  }

  const roleLabels = { designer: "Designer", marketer: "Marketer", hr: "HR Manager", sales: "Sales Manager" };
  const roleLabel = role && roleLabels[role] ? roleLabels[role] : "No role yet";

  const openToolObjs = openTabs.map(k => TOOLS.find(t => t.key === k)).filter(Boolean);

  return (
    <>
      {/* LEFT — favicon sphere + merged tab chain */}
      <div style={{
        position: "fixed", top: 20, left: 24, zIndex: 120,
        display: "flex", alignItems: "center",
      }}>
        <button
          onClick={onFaviconClick}
          className="press-fx"
          title={isHome ? "Brand HQ" : "Back to Home"}
          style={{
            width: 48, height: 48,
            borderRadius: "50%",
            flexShrink: 0,
            background: "var(--ink)",
            border: "none",
            color: "rgba(232,254,103,1)",
            fontFamily: HOME_SERIF,
            fontSize: 11,
            fontWeight: 400,
            letterSpacing: 0.4,
            cursor: "pointer",
            padding: 0,
            zIndex: 2,
            position: "relative",
            marginRight: -14,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            animation: faviconPressed ? "faviconPulse 0.3s ease" : "none",
            transition: "opacity 0.15s ease",
          }}
          onMouseEnter={e => e.currentTarget.style.opacity = "0.85"}
          onMouseLeave={e => e.currentTarget.style.opacity = "1"}
        >BHQ</button>

        {/* Merged tab chain */}
        <div ref={menuRef} style={{

// =============== SHELL ===============
function Shell({ active, go, children, fullBleed }) {
  // Two-finger trackpad swipe-right → back to Home (skip Home itself
  // and the horizontally-scrolling Memory timeline to avoid conflicts).
  useEffect(() => {
    if (active === "home" || active === "memory" || active === "role") return;
    let accX = 0, lastT = 0, cooling = false;
    function onWheel(e) {
      const now = Date.now();
      if (now - lastT > 260) accX = 0;
      lastT = now;
      if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) {
        accX += e.deltaX;
        if (!cooling && accX < -150) {
          cooling = true;
          go("home");
          setTimeout(() => { cooling = false; accX = 0; }, 700);
        }
      }
    }
    window.addEventListener("wheel", onWheel, { passive: true });
    return () => window.removeEventListener("wheel", onWheel);
  }, [active]);

  return (
    <div style={{ minHeight: "100vh", color: "var(--ink)", position: "relative", overflow: "hidden" }}>
      <UniversalTopBar activeScreen={active} go={go} />
      {fullBleed ? (
        <div key={active} style={{ animation: active === "memory" ? "fadeIn 0.25s ease both" : "screenIn 0.4s cubic-bezier(0.22,1,0.36,1) backwards" }}>
          {children}
        </div>
      ) : (
        <div key={active} style={{
          padding: "100px 52px 72px",
          animation: "screenIn 0.45s cubic-bezier(0.22,1,0.36,1) backwards",
        }}>
          <div style={{ maxWidth: "100%", margin: "0 auto", position: "relative" }}>
            {children}
          </div>
        </div>
      )}
    </div>
  );
}

    variant === "strong" ? "photo-liquid photo-liquid-strong" :
    variant === "subtle" ? "photo-liquid photo-liquid-subtle" :
    "photo-liquid";
  return (
    <div
      className={`${filterClass}${selected ? " photo-liquid-selected" : ""}`}
      onClick={onClick}
      style={{
        width: size, height: size,
        cursor: onClick ? "pointer" : "default",

          <div style={{ borderTop: `1px solid ${BORDER}`, marginTop: 24, paddingTop: 18 }}>
            <SectionLabel>Signature Style</SectionLabel>
            <div style={{ marginTop: 12, display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
              {["Minimal","Standard","Detailed"].map(s => (
                <button key={s} onClick={() => setStyle(s)} style={{
                  padding: "12px 8px", borderRadius: 8, cursor: "pointer",
                  border: style === s ? `2px solid var(--ink)` : `1px solid var(--border)`,

          <div style={{ marginTop: 24 }}>

        <Card style={{ padding: 24 }}>
          <SectionLabel>Preview</SectionLabel>
          <div style={{
            marginTop: 16, height: 160, background: FAINT,
            border: `1px dashed ${BORDER}`, borderRadius: 4, padding: 20,
            display: "flex", flexDirection: "column", justifyContent: "center", gap: 4,
          }}>
            <div style={{ height: 14, width: 160, background: SOLID, borderRadius: 2 }} />
            <div style={{ height: 10, width: 110, background: "#999", borderRadius: 2 }} />
            <div style={{ width: 200, borderTop: "1.5px solid var(--border)", margin: "8px 0" }} />
            <div style={{ height: 8, width: 180, background: "#bbb", borderRadius: 2 }} />
            <div style={{ height: 8, width: 140, background: "#bbb", borderRadius: 2 }} />
            <div style={{ height: 8, width: 200, background: "#bbb", borderRadius: 2 }} />
          </div>
          <div style={{ marginTop: 16, fontSize: 12, color: "#555" }}>Looks good?</div>
          <div style={{ marginTop: 10, display: "flex", gap: 8 }}>
            <DarkButton>Copy HTML</DarkButton>
            <OutlineButton>↓ Download PNG</OutlineButton>
          </div>
          <div style={{ marginTop: 16, fontSize: 11, color: MUTED }}>
            This signature uses current brand version <Highlight>V3.2</Highlight>

        </Card>
      </div>
    </Shell>
  );
}

  { key: "h2", label: "Subheading", size: 24, weight: 600 },

  function ToolIconBox({ kind, active }) {

    if (kind === "shape") return <div style={{ width: 14, height: 14, border: `1.5px solid ${c}`, borderRadius: 2 }} />;
    if (kind === "image") return (
      <div style={{ width: 16, height: 12, border: `1.5px solid ${c}`, borderRadius: 1, position: "relative" }}>
        <div style={{ position: "absolute", bottom: 1, left: 1, right: 1, height: 4, background: c, opacity: 0.5 }} />
      </div>
    );
    if (kind === "sticker") return <div style={{ width: 14, height: 14, borderRadius: 7, border: `1.5px solid ${c}` }} />;
    if (kind === "template") return (
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 1.5, width: 14, height: 14 }}>
        {[0,1,2,3].map(i => <div key={i} style={{ background: c, opacity: 0.6 }} />)}
      </div>
    );
    if (kind === "colour") return (
      <div style={{
        width: 14, height: 14, borderRadius: 7,
        background: "conic-gradient(#ff6b6b, #f7d774, #6bd09b, #6bb1ff, #c46bff, #ff6bcd, #ff6b6b)",
        border: `1px solid ${active ? "white" : "#666"}`,
      }} />
    );
    return null;
  }

  return (
    <Shell active="social" go={go}>

        gridTemplateColumns: "60px 240px 1fr 280px",

        border: `1px solid ${BORDER}`,
        borderRadius: 8,
        overflow: "hidden",
      }}>

        {/* TOOL RAIL */}
        <div style={{
          background: "var(--ph-1)",
          borderRight: `1px solid ${BORDER}`,
          padding: "12px 0",
          display: "flex", flexDirection: "column", alignItems: "center", gap: 6,
        }}>
          {SOCIAL_TOOLS.map(t => {
            const on = tool === t.key;

              <div key={t.key} style={{ position: "relative", width: "100%" }}>

                    border: on ? "none" : `1px solid ${BORDER}`,
                    display: "flex", alignItems: "center", justifyContent: "center",

                  marginTop: 2, fontSize: 9, color: on ? DARK : "#888",

                  border: `1px solid ${BORDER}`, borderRadius: 6,

                  <span>Instrument Sans</span><span style={{ color: MUTED }}>▾</span>

          {tool === "shape" && (

                      borderTop: s.key === "line" ? `2px solid ${DARK}` : undefined,
                      marginTop: s.key === "line" ? 13 : 0,
                      clipPath:
                        s.key === "tri" ? "polygon(50% 0%, 0% 100%, 100% 100%)" :
                        s.key === "star" ? "polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)" :
                        s.key === "arrow" ? "polygon(0 40%, 60% 40%, 60% 20%, 100% 50%, 60% 80%, 60% 60%, 0 60%)" :
                        undefined,
                    }} />
                    <div style={{ fontSize: 10, color: "#555", letterSpacing: 0.4, textTransform: "uppercase" }}>{s.label}</div>

              <SectionLabel>Templates</SectionLabel>

              <SectionLabel>Brand Palette</SectionLabel>

            <button style={{
              padding: "6px 10px", border: `1px solid ${BORDER}`, borderRadius: 14,
              fontSize: 12, color: DARK, background: SURFACE, cursor: "pointer",

          </div>

          <div style={{
            flex: 1, overflow: "auto",
            display: "flex", alignItems: "center", justifyContent: "center",
            padding: 24,
          }}>
            <div style={{
              width: fmt.w * (zoomPct / 100),
              height: fmt.h * (zoomPct / 100),
              background: SOCIAL_BG_COLOURS[bg],
              border: `1px solid ${BORDER}`, borderRadius: 4,

              color: bg === 2 || bg === 3 ? "white" : DARK,
              padding: 24, boxSizing: "border-box",
              display: "flex", flexDirection: "column",
              justifyContent: template === 0 ? "center" : template === 1 ? "flex-end" : template === 2 ? "flex-start" : template === 4 ? "center" : "space-between",

                  marginTop: 8,

                onChange={(e) => setBody(e.target.value)}
                rows={2}
                style={{
                  width: "100%", padding: "8px 10px",
                  borderRadius: 14, border: "1px solid rgba(26,31,38,0.35)",

            </div>
            <div>
              <div style={{ fontSize: 10, color: MUTED, letterSpacing: 0.8, textTransform: "uppercase", marginBottom: 6 }}>Weight</div>
              <div style={{ padding: "8px 10px", border: `1px solid ${BORDER}`, borderRadius: 6, fontSize: 12, color: DARK }}>
                {selectedElement === "headline" ? "700" : "400"}
              </div>
            </div>
          </div>

          <div>
            <div style={{ fontSize: 10, color: MUTED, letterSpacing: 0.8, textTransform: "uppercase", marginBottom: 6 }}>Alignment</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 4 }}>
              {["←","↔","→","≡"].map((s, i) => (
                <button key={i} style={{
                  padding: "6px 0", borderRadius: 4,
                  border: `1px solid ${BORDER}`, background: i === 0 ? "var(--ph-2)" : "white",
                  cursor: "pointer", fontSize: 12, color: DARK,
                }}>{s}</button>
              ))}
            </div>
          </div>

          <div>
            <div style={{ fontSize: 10, color: MUTED, letterSpacing: 0.8, textTransform: "uppercase", marginBottom: 6 }}>Colour</div>
            <div style={{ display: "flex", gap: 6 }}>
              {[DARK, "white", "#7A6E8A", "#6E8A70", "#8A6E68"].map((c, i) => (
                <div key={i} style={{
                  width: 22, height: 22, borderRadius: 4,
                  background: c, border: `1px solid ${BORDER}`,
                  cursor: "pointer",
                }} />
              ))}
            </div>
          </div>

          <div style={{ paddingTop: 12, borderTop: `1px solid ${BORDER}` }}>
            <div style={{ fontSize: 10, color: MUTED, letterSpacing: 0.8, textTransform: "uppercase", marginBottom: 6 }}>Layer</div>
            <div style={{ display: "flex", gap: 4 }}>
              {["↑", "↓", "⤒", "⤓", "⌬"].map((s, i) => (
                <button key={i} title={["Bring forward","Send backward","To front","To back","Lock"][i]} style={{
                  flex: 1, padding: "6px 0", borderRadius: 4,
                  border: `1px solid ${BORDER}`, background: SURFACE,
                  cursor: "pointer", fontSize: 12, color: "#555",
                }}>{s}</button>
              ))}
            </div>
          </div>

          <div style={{ flex: 1 }} />

          <div style={{ paddingTop: 12, borderTop: `1px solid ${BORDER}` }}>
            <div style={{ display: "flex", gap: 6 }}>
              <OutlineButton style={{ flex: 1, padding: "8px 10px", fontSize: 11 }}>Save Draft</OutlineButton>
            </div>
            <div style={{ marginTop: 8 }}>
              <DarkButton full style={{ padding: "10px 14px", fontSize: 13 }}>↑ Export Post</DarkButton>
            </div>
            <div style={{ marginTop: 8, fontSize: 10, color: MUTED, textAlign: "center", fontFamily: MONO, letterSpacing: 0.4 }}>
              PNG · JPG · MP4 · GIF
            </div>
          </div>
        </div>
      </div>
    </Shell>
  );
}

const EVENT_PHOTO_OFFSETS = MEMORY_EVENTS.reduce((acc, _e, i) => {
  acc.push(i === 0 ? 0 : acc[i - 1] + MEMORY_EVENTS[i - 1].L + MEMORY_EVENTS[i - 1].M + MEMORY_EVENTS[i - 1].S);
  return acc;
}, []);

function memoryDensity(count) {
  if (count <= 4)  return { spread: 50,  height: 120, width: 180 };
  if (count <= 14) return { spread: 70,  height: 220, width: 200 };
  if (count <= 34) return { spread: 90,  height: 320, width: 240 };
  return                  { spread: 110, height: 420, width: 260 };
}

function memoryPRNG(eventIdx, i, salt) {
  const v = Math.sin(eventIdx * 999.31 + i * 73.71 + salt * 17.13) * 43758.5453;
  return v - Math.floor(v);
}

function memoryCirclePos(eventIdx, i, spread, height, size) {
  const ry = memoryPRNG(eventIdx, i, 1);
  const rx = memoryPRNG(eventIdx, i, 2);
  const yt = ry * 2 - 1;
  const y = yt * (height / 2);
  const xMax = spread * (1 - Math.pow(Math.abs(yt), 1.4));
  const x = (rx * 2 - 1) * xMax;
  return { x, y };
}

function memorySizes(L, M, S) {
  const arr = [];
  for (let i = 0; i < L; i++) arr.push(64);
  for (let i = 0; i < M; i++) arr.push(40);
  for (let i = 0; i < S; i++) arr.push(24);
  return arr
    .map((v, i) => ({ v, k: Math.sin(i * 12.91 + L * 7.3 + arr.length * 1.7) }))
    .sort((a, b) => a.k - b.k)
    .map(x => x.v);
}

const MEMORY_PAD_START = 60;
const MEMORY_PAD_END = 220;          // extra right pad so the last cluster label is fully visible
const MEMORY_TIMELINE_H = 600;
const MEMORY_AXIS_Y = MEMORY_TIMELINE_H / 2;
const CLUSTER_AXIS_Y = MEMORY_AXIS_Y - 30; // shift clusters up so constellation is vertically centred in usable area

const MEMORY_CLUSTERS = (() => {
  let x = MEMORY_PAD_START;
  return MEMORY_EVENTS.map((e, idx) => {
    const d = memoryDensity(e.count);
    const cx = x + d.width / 2;
    x += d.width;
    return { ...e, idx, ...d, cx };
  });
})();

const MEMORY_CANVAS_W =
  MEMORY_CLUSTERS[MEMORY_CLUSTERS.length - 1].cx +
  memoryDensity(MEMORY_CLUSTERS[MEMORY_CLUSTERS.length - 1].count).width / 2 +

function ScreenMemory({ go }) {
  const [selected, setSelected] = useState(new Set());
  const [zoom, setZoom] = useState(0.6);
  const [activeYear, setActiveYear] = useState(2022);
  const [previewPhoto, setPreviewPhoto] = useState(null);
  const [search, setSearch] = useState("");

  const scrollRef = useRef(null);
  const zoomRef = useRef(0.6);
  const mouseXRef = useRef(0);
  const clickTimerRef = useRef(null);
  useEffect(() => { zoomRef.current = zoom; }, [zoom]);

  function toggleSelect(id) {
    setSelected(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }
  function clearSelection() { setSelected(new Set()); }

  function onPhotoEvent(id) {
    if (clickTimerRef.current) {
      clearTimeout(clickTimerRef.current);
      clickTimerRef.current = null;
      // double click → select for download (no modal)
      toggleSelect(id);
      return;
    }
    clickTimerRef.current = setTimeout(() => {
      clickTimerRef.current = null;
      // single click → open full-size preview
      setPreviewPhoto(id);
    }, 230);
  }

  function scrollToYear(y) {
    setActiveYear(y);
    const evs = MEMORY_CLUSTERS.filter(c => c.year === y);
    if (!evs.length || !scrollRef.current) return;
    const z = zoomRef.current;
    const targetX = evs[0].cx * z;
    scrollRef.current.scrollTo({ left: Math.max(0, targetX - 80), behavior: "smooth" });
  }

  function onTimelineScroll() {
    if (!scrollRef.current) return;
    const sl = scrollRef.current.scrollLeft;
    const vw = scrollRef.current.clientWidth;
    const z = zoomRef.current;
    const centerX = (sl + vw / 2) / z;
    let closest = MEMORY_YEARS[0];
    let minDist = Infinity;
    MEMORY_YEARS.forEach(y => {
      const evs = MEMORY_CLUSTERS.filter(c => c.year === y);
      const c = (evs[0].cx + evs[evs.length - 1].cx) / 2;
      const d = Math.abs(centerX - c);
      if (d < minDist) { minDist = d; closest = y; }
    });
    setActiveYear(closest);
  }

  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;

    // Track cursor X relative to the scroll container via mousemove
    // so the zoom handler always has the precise current position.
    const onMouseMove = (e) => {
      mouseXRef.current = e.clientX - el.getBoundingClientRect().left;
    };
    el.addEventListener("mousemove", onMouseMove);

    const handler = (e) => {
      e.preventDefault();
      if (e.ctrlKey || e.metaKey) {
        // Cursor-anchored zoom:
        //   canvasPoint = (scrollLeft + cursorX) / prevScale  — the canvas coordinate under cursor
        //   after scale change: scrollLeft = canvasPoint * newScale - cursorX
        const cursorX = mouseXRef.current;
        const prevScale = zoomRef.current;
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        const newScale = Math.min(2.0, Math.max(0.5, +(prevScale + delta).toFixed(2)));
        if (newScale === prevScale) return;
        const canvasPoint = (el.scrollLeft + cursorX) / prevScale;
        setZoom(newScale);
        zoomRef.current = newScale;
        requestAnimationFrame(() => {
          const rawTn = Math.max(0, Math.min(1, (newScale - 1.3) / 0.5));
          const gtn = rawTn * rawTn * (3 - 2 * rawTn);
          const sfn = newScale / 1.8;
          const gcW = (MEMORY_PAD_START * 1.8 + unifiedGridLayout.maxCol * GRID_CELL + 34) * sfn + MEMORY_PAD_END;
          const maxS = Math.max(0, (1 - gtn) * (MEMORY_CANVAS_W - 40) * newScale + gtn * gcW - el.clientWidth);
          el.scrollLeft = Math.min(canvasPoint * newScale - cursorX, maxS);
        });
        return;
      }
      // Horizontal scroll: deltaX wins if larger; otherwise deltaY → horizontal
      const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
      const z = zoomRef.current;
      const rawTz = Math.max(0, Math.min(1, (z - 1.3) / 0.5));
      const gtz = rawTz * rawTz * (3 - 2 * rawTz);
      const gcWz = (MEMORY_PAD_START * 1.8 + unifiedGridLayout.maxCol * GRID_CELL + 34) * (z / 1.8) + MEMORY_PAD_END;
      const maxScroll = Math.max(0, (1 - gtz) * (MEMORY_CANVAS_W - 40) * z + gtz * gcWz - el.clientWidth);
      el.scrollLeft = Math.max(0, Math.min(el.scrollLeft + delta * 1.5, maxScroll));
    };
    el.addEventListener("wheel", handler, { passive: false });
    return () => {
      el.removeEventListener("wheel", handler);
      el.removeEventListener("mousemove", onMouseMove);
    };
  }, []);

  // Scroll to show TODAY at the right edge of the viewport on first open
  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    // TODAY visual position = (MEMORY_CANVAS_W - 40) * zoom; place it at right edge
    el.scrollLeft = (MEMORY_CANVAS_W - 40) * zoomRef.current - el.clientWidth;
  }, []);

  const yearMarkers = MEMORY_YEARS.map(y => {
    const evs = MEMORY_CLUSTERS.filter(c => c.year === y);
    const cxFirst = evs[0].cx;
    const cxCenter = (evs[0].cx + evs[evs.length - 1].cx) / 2;
    return { year: y, cx: cxFirst, cxCenter };
  });

  // Year boundary x-positions (left edge of each year's first cluster, except 2022)
  const yearBoundaries = MEMORY_YEARS.slice(1).map(y => {
    const first = MEMORY_CLUSTERS.find(c => c.year === y);
    return { year: y, x: first.cx - first.width / 2 };
  });

  const layoutByCluster = useMemo(
    () => MEMORY_CLUSTERS.map(c => {
      const sizes = memorySizes(c.L, c.M, c.S);
      const arr = sizes.map((sz, i) => {
        const p = memoryCirclePos(c.idx, i, c.spread, c.height, sz);
        return { sz, x: p.x, y: p.y };
      });
      for (let it = 0; it < 5; it++) {
        for (let a = 0; a < arr.length; a++) {
          for (let b = a + 1; b < arr.length; b++) {
            const A = arr[a], B = arr[b];
            const dx = B.x - A.x, dy = B.y - A.y;
            const d = Math.sqrt(dx * dx + dy * dy) || 0.0001;
            const minD = (A.sz + B.sz) / 2 + 2;
            if (d < minD) {
              const push = (minD - d) / 2;
              const ux = dx / d, uy = dy / d;
              A.x -= ux * push; A.y -= uy * push;
              B.x += ux * push; B.y += uy * push;
            }
          }
        }
      }
      return arr;
    }),
    []
  );

  // Unified gallery grid — all photos in one continuous wall, rows fill top→bottom then next column
  const GRID_ROWS = 6;
  const GRID_PHOTO_SIZE = 68; // ~30% larger than the original 52px
  const GRID_GAP = 10;        // ~half the original 20px gap → tight mosaic feel
  const GRID_CELL = GRID_PHOTO_SIZE + GRID_GAP; // 78
  const unifiedGridLayout = useMemo(() => {
    // Build result[clusterIdx][photoIdx] = { gx, gy } in GRID_FULL screen pixels
    // gy is an offset relative to CLUSTER_AXIS_Y (not MEMORY_AXIS_Y).
    // Formula anchors row 0 so its top edge sits ~24 px below the canvas top when gridT=1.
    const result = MEMORY_CLUSTERS.map(c => memorySizes(c.L, c.M, c.S).map(() => null));
    let col = 0, row = 0, maxCol = 0;
    MEMORY_CLUSTERS.forEach((c, ci) => {
      const n = memorySizes(c.L, c.M, c.S).length;
      for (let pi = 0; pi < n; pi++) {
        // gx: absolute left position (GRID_FULL screen pixels); gy: offset from CLUSTER_AXIS_Y
        const gx = MEMORY_PAD_START * 1.8 + col * GRID_CELL; // 1.8 = GRID_FULL
        const gy = row * GRID_CELL + (24 + 16 + GRID_PHOTO_SIZE / 2 - CLUSTER_AXIS_Y);
        result[ci][pi] = { gx, gy };
        if (col > maxCol) maxCol = col;
        row++;
        if (row >= GRID_ROWS) { row = 0; col++; }
      }
    });
    return { layout: result, maxCol };
  }, []);

  // Search filter — null means "show all"
  const filteredClusterIndices = useMemo(() => {
    const q = search.trim().toLowerCase();
    if (!q) return null;
    const matched = new Set(
      MEMORY_CLUSTERS.filter(c =>
        c.name.toLowerCase().includes(q) ||
        String(c.year).includes(q) ||
        c.mon.toLowerCase().includes(q) ||
        (c.mon + " " + c.year).toLowerCase().includes(q) ||
        (String(c.year) + " " + c.mon).toLowerCase().includes(q)
      ).map(c => c.idx)
    );
    return matched;
  }, [search]);

  // Grid/constellation interpolation — 0 at zoom ≤ 1.3, 1 at zoom ≥ 1.8
  const GRID_START = 1.3, GRID_FULL = 1.8;
  const rawT = Math.max(0, Math.min(1, (zoom - GRID_START) / (GRID_FULL - GRID_START)));
  const gridT = rawT * rawT * (3 - 2 * rawT); // smoothstep

  // Unified grid layout — destructure here so wheel handler and render share the same values
  const { layout: unifiedLayout, maxCol: gridMaxCol } = unifiedGridLayout;
  const scaleFactor = zoom / GRID_FULL; // 1.0 at GRID_FULL, scales proportionally above it
  // Usable scroll end in screen px:
  //   Constellation → TODAY position: (MEMORY_CANVAS_W - 40) * zoom
  //   Grid          → right edge of last column + end padding
  const gridCanvasW = (MEMORY_PAD_START * 1.8 + gridMaxCol * GRID_CELL + GRID_PHOTO_SIZE / 2) * scaleFactor + MEMORY_PAD_END;
  const usefulW = (1 - gridT) * (MEMORY_CANVAS_W - 40) * zoom + gridT * gridCanvasW;
  // Outer wrapper extends usefulW + 200px so there's breathing room at the right edge
  const outerW = Math.round(usefulW + 200);
  // Inner canvas: interpolate between timeline width and outerW so it never overflows the scroll area
  const innerW = Math.round((1 - gridT) * MEMORY_CANVAS_W * zoom + gridT * outerW);

  return (
    <Shell active="memory" go={go} fullBleed>
      <div style={{ display: "flex", flexDirection: "column", height: "100vh", paddingTop: 84, position: "relative" }}>

        {/* INNER TOP BAR — heading + subtitle + search + TODAY */}
        <div style={{
          flexShrink: 0,
          padding: "20px 24px 16px",
          borderBottom: "1px solid rgba(0,0,0,0.06)",
          background: HOME_BG,
        }}>
          {/* Row 1: title + TODAY */}
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between" }}>
            <div>
              <div style={{
                fontFamily: HOME_SERIF, fontSize: 80, fontWeight: 400,
                color: "var(--ink)", letterSpacing: -2.5, lineHeight: 0.9,
              }}>Photo <Highlight>Archive</Highlight>.</div>
              <div style={{
                marginTop: 8, fontSize: 11, color: "#7A7885",
                fontFamily: MONO, letterSpacing: 0.6,
              }}>
                TOTAL 1,861 PHOTOS · SPANS 2022–TODAY
                {filteredClusterIndices !== null && (
                  <span style={{ marginLeft: 12, color: "var(--accent)", background: "rgba(0,0,0,0.08)", borderRadius: 4, padding: "1px 6px" }}>
                    {filteredClusterIndices.size} EVENTS MATCH
                  </span>
                )}
              </div>
            </div>
          </div>
          {/* Row 2: search bar */}
          <div style={{ marginTop: 16, position: "relative", maxWidth: 480 }}>
            <span style={{
              position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)",
              fontSize: 14, color: "var(--muted)", pointerEvents: "none", lineHeight: 1,
            }}>⌕</span>
            <input
              type="text"
              placeholder="Search events, people, dates, locations…"
              value={search}
              onChange={e => setSearch(e.target.value)}
              style={{
                width: "100%", height: 36,
                borderRadius: 14, border: "1px solid rgba(26,31,38,0.10)",
                padding: "0 36px 0 32px",
                background: "rgba(255,255,255,0.96)", fontSize: 13,
                fontFamily: "'Inter', sans-serif", fontWeight: 400,
                color: "rgba(26,31,38,0.88)", outline: "none",
                boxShadow: "0px 2px 12px rgba(0,0,0,0.06)",
                caretColor: "var(--ink)", transition: "border-color 0.12s",
                boxSizing: "border-box",
              }}
            />
            {search && (
              <button
                onClick={() => setSearch("")}
                style={{
                  position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)",
                  background: "none", border: "none", cursor: "pointer",
                  color: "var(--muted)", fontSize: 13, lineHeight: 1, padding: 2,
                }}
              >✕</button>
            )}
          </div>
        </div>

        {/* TIMELINE AREA */}
        <div style={{ position: "relative", flex: 1, minHeight: MEMORY_TIMELINE_H }}>
          <div
            ref={scrollRef}
            onScroll={onTimelineScroll}
            style={{
              position: "absolute", inset: 0,
              overflowX: "hidden", overflowY: "hidden",
              width: "100%",
            }}
          >
            {/* Outer wrapper: provides scroll bounds; canvas sits at top so grid row 0 starts at ~24px */}
            <div style={{
              width: outerW,
              height: "100%",
              display: "flex",
              alignItems: "flex-start",
            }}>
              {/* Inner canvas: no CSS transform — all positions pre-multiplied by zoom */}
              <div style={{
                position: "relative",
                flexShrink: 0,
                width: innerW,
                height: MEMORY_TIMELINE_H,
                overflow: "visible",
              }}>
                {/* AXIS LINE */}
                <div style={{
                  position: "absolute",
                  left: 0, right: 0, top: CLUSTER_AXIS_Y,
                  height: 1, background: "rgba(0,0,0,0.12)",
                  opacity: 1 - gridT, transition: "opacity 0.3s ease",
                }} />

                {/* YEAR BOUNDARY DASHED LINES */}
                {yearBoundaries.map(b => (
                  <div key={b.year} style={{
                    position: "absolute",
                    left: b.x * zoom, top: 0, bottom: 0,
                    width: 0,
                    borderLeft: "1px dashed rgba(0,0,0,0.06)",
                    pointerEvents: "none",
                    opacity: 1 - gridT, transition: "opacity 0.3s ease",
                  }} />
                ))}

                {/* YEAR AXIS DOTS (subtle) */}
                {yearMarkers.map(ym => {
                  const on = activeYear === ym.year;
                  return (
                    <div key={"dot-" + ym.year} style={{
                      position: "absolute",
                      left: ym.cxCenter * zoom - 3, top: CLUSTER_AXIS_Y - 3,
                      width: 6, height: 6, borderRadius: 3,
                      background: on ? "var(--accent)" : "var(--line)",
                      opacity: 1 - gridT, transition: "opacity 0.3s ease",
                    }} />
                  );
                })}

                {/* CLUSTERS */}
                {MEMORY_CLUSTERS.map((c, idx) => {
                  const positions = layoutByCluster[idx];
                  const isFiltered = filteredClusterIndices !== null && !filteredClusterIndices.has(c.idx);
                  const clusterOpacity = isFiltered ? 0.1 : 1;

                  // Label: fixed near the bottom year row, fades out in grid mode

                  return (
                    <Fragment key={idx}>
                      {/* Vertical tick line — runs from cluster top down to label row */}
                      <div style={{
                        position: "absolute",
                        left: c.cx * zoom - 0.5,
                        top: CLUSTER_AXIS_Y - c.height * zoom / 2,
                        bottom: 54,
                        width: 1,
                        background: "var(--line)",
                        pointerEvents: "none",
                        opacity: clusterOpacity * (1 - gridT), transition: "opacity 0.3s ease",
                      }} />
                      {/* Axis dot — fades out in grid mode */}
                      <div style={{
                        position: "absolute",
                        left: c.cx * zoom - 2,
                        top: CLUSTER_AXIS_Y - 2,
                        width: 4, height: 4, borderRadius: 2,
                        background: "rgba(0,0,0,0.2)",
                        opacity: clusterOpacity * (1 - gridT), transition: "opacity 0.3s ease",
                      }} />
                      {positions.map((p, i) => {
                        const id = `${idx}_${i}`;
                        const ug = unifiedLayout[idx][i];
                        // Unified gallery: cx is absolute (not relative to cluster centre)
                        // Constellation: (c.cx + p.x) * zoom  →  Grid: ug.gx * scaleFactor
                        const cx = (c.cx + p.x) * zoom * (1 - gridT) + ug.gx * scaleFactor * gridT;
                        // Y: constellation offset scales with zoom; grid row offset scales with scaleFactor
                        const py = p.y * zoom * (1 - gridT) + ug.gy * scaleFactor * gridT;
                        // Size: interpolate to GRID_PHOTO_SIZE (scales proportionally above GRID_FULL)
                        const sz = p.sz + (GRID_PHOTO_SIZE * scaleFactor - p.sz) * gridT;
                        return (
                          <PhotoCircle
                            key={i}
                            id={id}
                            size={sz}
                            cx={cx}
                            cy={CLUSTER_AXIS_Y + py}
                            gradIdx={(EVENT_PHOTO_OFFSETS[idx] + i) % ARCHIVE_PHOTOS.length}
                            selected={selected.has(id)}
                            onPhotoEvent={isFiltered ? () => {} : onPhotoEvent}
                          />
                        );
                      })}
                      {/* Cluster label — fixed bottom row, aligned with year labels, fades in grid mode */}
                      <div style={{
                        position: "absolute",
                        left: c.cx * zoom - 80,
                        bottom: 54,
                        width: 160, textAlign: "center",
                        pointerEvents: "none",
                        opacity: clusterOpacity * (1 - gridT), transition: "opacity 0.3s ease",
                      }}>
                        <div style={{
                          fontSize: 10, fontFamily: MONO,
                          color: "#1E1C23", letterSpacing: 0.8,
                          fontWeight: 500,
                        }}>{c.name}</div>
                        <div style={{
                          marginTop: 3, fontSize: 10, fontFamily: MONO,
                          color: "#7A7885", letterSpacing: 0.6,
                        }}>{c.mon} {c.year}</div>
                      </div>
                    </Fragment>
                  );
                })}

                {/* YEAR LABELS — bottom of timeline, at first cluster x of each year */}
                {yearMarkers.map(ym => {
                  const on = activeYear === ym.year;
                  return (
                    <div
                      key={"yl-" + ym.year}
                      onClick={() => scrollToYear(ym.year)}
                      style={{
                        position: "absolute",
                        bottom: 16,
                        left: ym.cx * zoom - 80,
                        width: 160, textAlign: "center",
                        fontFamily: "'Inter', sans-serif",
                        fontSize: on ? 28 : 16,
                        fontWeight: on ? 700 : 300,
                        color: on ? "var(--ink)" : "var(--muted)",
                        letterSpacing: -0.4,
                        lineHeight: 1,
                        cursor: "pointer",
                        transition: "font-size 0.2s ease, color 0.2s ease",
                      }}
                    >{ym.year}</div>
                  );
                })}

                {/* TODAY line at far right of canvas */}
                <div style={{
                  position: "absolute",
                  left: (MEMORY_CANVAS_W - 40) * zoom,
                  top: 0, bottom: 0,
                  width: 1, background: "#6B6B6B",
                  pointerEvents: "none",
                }}>
                  <div style={{
                    position: "absolute",
                    top: 8, right: 8,
                    fontSize: 10, fontFamily: MONO,
                    color: "#6B6B6B",
                    letterSpacing: 0.8,
                    whiteSpace: "nowrap",
                  }}>TODAY</div>
                </div>
              </div>
            </div>
          </div>

        </div>


        {/* DOWNLOAD CARD — bottom-right, glass style */}
        <div style={{
          position: "fixed",
          bottom: 24, right: 24,
          display: "flex", alignItems: "center", gap: 12,
          padding: "8px 12px",
          background: "var(--surface)",
          backdropFilter: "blur(10px)",
          WebkitBackdropFilter: "blur(10px)",
          border: "1px solid var(--border)",
          borderRadius: 24,
          opacity: selected.size > 0 ? 1 : 0,
          pointerEvents: selected.size > 0 ? "auto" : "none",
          transition: "opacity 0.2s ease",
          zIndex: 90,
          maxWidth: "calc(100vw - 80px - 48px)",
        }}>
          <span
            onClick={clearSelection}
            style={{
              fontSize: 13, color: "var(--muted)",
              cursor: "pointer", padding: "0 4px",
              userSelect: "none", flexShrink: 0,
            }}
          >✕ Clear</span>

          {/* Preview row of selected photos */}
          {(() => {
            const ids = Array.from(selected);
            const MAX = 6;
            const shown = ids.slice(0, MAX);
            const extra = ids.length - shown.length;
            return (
              <div style={{ display: "flex", alignItems: "center", gap: 4, flexShrink: 0 }}>
                {shown.map(id => {
                  const [evIdxStr, photoIdxStr] = id.split("_");
                  const evIdx = parseInt(evIdxStr, 10);
                  const phIdx = parseInt(photoIdxStr, 10);
                  const gradIdx = (EVENT_PHOTO_OFFSETS[evIdx] + phIdx) % ARCHIVE_PHOTOS.length;
                  return (
                    <div
                      key={id}
                      onClick={() => toggleSelect(id)}
                      title="Click to remove"
                      style={{ position: "relative", width: 28, height: 28, flexShrink: 0, cursor: "pointer" }}
                    >
                      <div style={{
                        width: 28, height: 28, borderRadius: "50%",
                        overflow: "hidden", border: "1.5px solid var(--surface)",
                        background: "var(--border)",
                      }}>
                        <img src={archivePhoto(gradIdx)} alt=""
                          style={{ width: "100%", height: "100%", objectFit: "cover", objectPosition: "center top", display: "block" }}
                          onError={(e) => { e.currentTarget.style.display = "none"; }} />
                      </div>
                      <div style={{
                        position: "absolute", top: -3, right: -3,
                        width: 13, height: 13, borderRadius: "50%",
                        background: "var(--accent)", color: "var(--ink)",
                        fontSize: 7, fontWeight: 700,
                        display: "flex", alignItems: "center", justifyContent: "center",
                        border: "1.5px solid var(--surface)", zIndex: 4, pointerEvents: "none",
                      }}>✓</div>
                    </div>
                  );
                })}
                {extra > 0 && (
                  <span style={{
                    fontSize: 11, color: "var(--muted)", marginLeft: 4,
                    fontFamily: MONO, letterSpacing: 0.4,
                  }}>+{extra}</span>
                )}
              </div>
            );
          })()}

          <DarkButton style={{ flexShrink: 0 }}>↓ Download ({selected.size})</DarkButton>
        </div>

        {/* FULL-SIZE PHOTO PREVIEW MODAL */}
        {previewPhoto && (() => {
          const [evIdxStr, phIdxStr] = previewPhoto.split("_");
          const evIdx = parseInt(evIdxStr, 10);
          const phIdx = parseInt(phIdxStr, 10);
          const ev = MEMORY_EVENTS[evIdx];
          const gradIdx = (EVENT_PHOTO_OFFSETS[evIdx] + phIdx) % ARCHIVE_PHOTOS.length;
          const isSel = selected.has(previewPhoto);
          return (
            <div
              onClick={(e) => { if (e.target === e.currentTarget) setPreviewPhoto(null); }}
              style={{
                position: "fixed", inset: 0, zIndex: 200,
                background: "rgba(20,19,24,0.88)",
                backdropFilter: "blur(6px)",
                WebkitBackdropFilter: "blur(6px)",
                display: "flex", flexDirection: "column",
              }}
            >
              {/* Modal top bar */}
              <div style={{
                height: 56, flexShrink: 0,
                display: "flex", alignItems: "center", justifyContent: "space-between",
                padding: "0 24px", color: "white",
                borderBottom: "1px solid rgba(255,255,255,0.06)",
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{
                    fontSize: 11, letterSpacing: 1.2, color: "rgba(255,255,255,0.45)",
                    textTransform: "uppercase", fontFamily: MONO,
                  }}>Photo Archive</span>
                  <span style={{ color: "rgba(255,255,255,0.25)" }}>·</span>
                  <span style={{ fontSize: 13, fontWeight: 600 }}>{ev.name}</span>
                  <span style={{ color: "rgba(255,255,255,0.3)" }}>·</span>
                  <span style={{ fontSize: 11, color: "rgba(255,255,255,0.6)", fontFamily: MONO, letterSpacing: 0.6 }}>
                    {ev.mon} {ev.year}
                  </span>
                </div>
                <button
                  onClick={() => setPreviewPhoto(null)}
                  style={{
                    color: "white", fontSize: 16,
                    background: "transparent", cursor: "pointer",
                    width: 32, height: 32, borderRadius: 16,
                    border: "1px solid rgba(255,255,255,0.15)",
                    display: "flex", alignItems: "center", justifyContent: "center",
                  }}
                >✕</button>
              </div>

              {/* Stage with the photo */}
              <div
                onClick={() => setPreviewPhoto(null)}
                style={{
                  flex: 1, display: "flex", alignItems: "center", justifyContent: "center",
                  padding: 32, cursor: "pointer", position: "relative",
                }}
              >
                <div
                  onClick={(e) => e.stopPropagation()}
                  style={{
                    width: "min(620px, 72vw)",
                    aspectRatio: "4 / 5",
                    maxHeight: "78vh",
                    borderRadius: 10,
                    background: "var(--border)",
                    boxShadow: "0 24px 80px rgba(0,0,0,0.6)",
                    border: isSel ? "3px solid white" : "1px solid rgba(255,255,255,0.1)",
                    position: "relative",
                    cursor: "default",
                    overflow: "hidden",
                  }}
                >
                  <img
                    src={archivePhoto(gradIdx).replace('w=400&h=400', 'w=800&h=1000')}
                    alt=""
                    style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover", objectPosition: "center top", display: "block" }}
                    onError={(e) => { e.currentTarget.style.display = "none"; }}
                  />
                  {isSel && (
                    <div style={{
                      position: "absolute", top: 16, left: 16,
                      width: 28, height: 28, borderRadius: 14,
                      background: SURFACE, color: "#1E1C23",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 13, fontWeight: 700,
                      boxShadow: "0 2px 8px rgba(0,0,0,0.3)",
                    }}>✓</div>
                  )}
                  <div style={{
                    position: "absolute", bottom: 14, right: 16,
                    fontSize: 10, fontFamily: MONO,
                    color: "rgba(255,255,255,0.55)", letterSpacing: 0.8,
                    textTransform: "uppercase",
                  }}>4 : 5 · 3024×3780</div>
                </div>
              </div>

              {/* Bottom action bar */}
              <div style={{
                flexShrink: 0, padding: "18px 24px 24px",
                color: "white",
                borderTop: "1px solid rgba(255,255,255,0.06)",

                <div style={{ textAlign: "right", color: "rgba(255,255,255,0.7)" }}>
                  <div style={{ fontSize: 14, fontWeight: 600, color: "white", letterSpacing: -0.2 }}>

                  </div>

                  </div>

                <div style={{ width: 1, height: 36, background: "rgba(255,255,255,0.15)" }} />
                <button
                  onClick={() => toggleSelect(previewPhoto)}

// DOTS CANVAS — faithful port of Dots_Smile.html (login background)
// ============================================================
function DotsCanvas() {
  const canvasRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d', { alpha: false });

    // ── Constants (verbatim from source) ──────────────────────────────────
    const SPACING          = 9;
    const DOT_BASE         = 0.7;
    const DOT_MAX          = 2.6;
    const FLECK_RATE       = 0.05;
    const SMOOTH           = 0.12;
    const AMBIENT_STRENGTH = 0.85;
    const CLUSTER_RADIUS   = 220;
    const CLUSTER_CORE     = 95;
    const CLUSTER_STRENGTH = 1.55;
    const AURA_LAG         = 0.18;
    const TRAIL_SAMPLES    = 14;
    const TRAIL_SPACING_MS = 22;
    const RIPPLE_LIFE      = 2200;
    const RIPPLE_MAX       = 6;
    const RIPPLE_RINGS     = 4;
    const RIPPLE_RING_DELAY = 160;
    const RIPPLE_STRENGTH  = 2.6;

    // ── State ─────────────────────────────────────────────────────────────
    let W = 0, H = 0, DPR = 1;
    let cols = 0, rows = 0;
    let dots = [];
    let pointer = { x: -9999, y: -9999, active: false };
    let aura = { x: 0, y: 0, vx: 0, vy: 0, intensity: 0 };
    let trail = [];
    let ripples = [];
    let lastSampleAt = 0;
    let lastFrame = performance.now();
    let animId = null;

    // ── Hash (verbatim) ───────────────────────────────────────────────────
    function hash(n) {
      n = (n ^ 61) ^ (n >>> 16);
      n = n + (n << 3);
      n = n ^ (n >>> 4);
      n = Math.imul(n, 0x27d4eb2d);
      n = n ^ (n >>> 15);
      return ((n >>> 0) % 100000) / 100000;
    }

    // ── Resize / build grid (verbatim) ────────────────────────────────────
    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width  = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

      cols = Math.ceil(W / SPACING) + 2;
      rows = Math.ceil(H / SPACING) + 2;
      const offX = (W - (cols - 1) * SPACING) / 2;
      const offY = (H - (rows - 1) * SPACING) / 2;

      dots = new Array(cols * rows);
      let k = 0;
      for (let j = 0; j < rows; j++) {
        for (let i = 0; i < cols; i++) {
          const jx   = (hash(i * 73856093 ^ j * 19349663) - 0.5) * 1.8;
          const jy   = (hash(i * 83492791 ^ j * 50331653) - 0.5) * 1.8;
          const dens = hash(i * 17 ^ j * 311);
          dots[k++] = {
            x:         offX + i * SPACING + jx,
            y:         offY + j * SPACING + jy,
            intensity: 0,
            target:    0,
            phase:     hash(i * 12421 ^ j * 4451) * Math.PI * 2,
            speed:     0.6 + hash(i * 911 ^ j * 6151) * 0.8,
            dens,
            fleck:     hash(i * 5749 ^ j * 17191) < FLECK_RATE,
            sticky:    hash(i * 313  ^ j * 977) < 0.006
                         ? 0.10 + hash(i * 11 ^ j * 7) * 0.10
                         : 0,
          };
        }
      }

      if (!aura.x && !aura.y) {
        aura.x = W * 0.5;
        aura.y = H * 0.5;
      }
    }

    // ── Pointer events ────────────────────────────────────────────────────
    function onPointerMove(e)  { pointer.x = e.clientX; pointer.y = e.clientY; pointer.active = true; }
    function onPointerEnter(e) { pointer.x = e.clientX; pointer.y = e.clientY; pointer.active = true; }
    function onPointerLeave()  { pointer.active = false; }
    function onPointerDown(e)  {
      ripples.push({ x: e.clientX, y: e.clientY, born: performance.now() });
      if (ripples.length > RIPPLE_MAX) ripples.shift();
    }
    canvas.addEventListener('pointermove',  onPointerMove);
    canvas.addEventListener('pointerenter', onPointerEnter);
    canvas.addEventListener('pointerleave', onPointerLeave);
    canvas.addEventListener('pointerdown',  onPointerDown);

    // ── Tick (verbatim logic) ─────────────────────────────────────────────
    function tick(now) {
      animId = requestAnimationFrame(tick);

      const dt = Math.min(64, now - lastFrame);
      lastFrame = now;

      // Background
      ctx.fillStyle = '#9aa3ad';
      ctx.fillRect(0, 0, W, H);

      // Aura easing
      const lag = Math.min(1, AURA_LAG * (dt / 16.67));
      const prevX = aura.x, prevY = aura.y;
      if (pointer.active) {
        aura.x += (pointer.x - aura.x) * lag;
        aura.y += (pointer.y - aura.y) * lag;
        aura.intensity += (1 - aura.intensity) * Math.min(1, 0.08 * (dt / 16.67));
      } else {
        aura.intensity += (0 - aura.intensity) * Math.min(1, 0.025 * (dt / 16.67));
      }
      aura.vx = aura.x - prevX;
      aura.vy = aura.y - prevY;

      // Trail sampling
      if (now - lastSampleAt > TRAIL_SPACING_MS) {
        trail.unshift({ x: aura.x, y: aura.y, born: now });
        if (trail.length > TRAIL_SAMPLES) trail.length = TRAIL_SAMPLES;
        lastSampleAt = now;
      }

      // Ripple rings
      const liveRipples = [];
      const maxAge = RIPPLE_LIFE + RIPPLE_RING_DELAY * (RIPPLE_RINGS - 1);
      for (const r of ripples) {
        const clickAge = now - r.born;
        if (clickAge >= maxAge) continue;
        for (let ri = 0; ri < RIPPLE_RINGS; ri++) {
          const age = clickAge - ri * RIPPLE_RING_DELAY;
          if (age < 0 || age >= RIPPLE_LIFE) continue;
          const t          = age / RIPPLE_LIFE;
          const eased      = 1 - (1 - t) * (1 - t);
          const radius     = eased * Math.max(W, H) * 0.78;
          const thickness  = 18 + t * 28;
          const ringFalloff = 1 - ri / RIPPLE_RINGS * 0.40;
          const strength   = (1 - t) * (1 - t * 0.7) * RIPPLE_STRENGTH * ringFalloff;
          liveRipples.push({ x: r.x, y: r.y, radius, thickness, strength });
        }
      }
      ripples = ripples.filter(r => now - r.born < maxAge);

      const followStep   = Math.min(1, SMOOTH * (dt / 16.67));
      const cullRadiusSq = (CLUSTER_RADIUS * 1.8) * (CLUSTER_RADIUS * 1.8);
      const coreFalloffSq = CLUSTER_CORE   * CLUSTER_CORE;
      const haloFalloffSq = CLUSTER_RADIUS * CLUSTER_RADIUS;

      // Per-dot loop (verbatim)
      for (let k = 0; k < dots.length; k++) {
        const d = dots[k];
        if (d.x < -2 || d.x > W + 2 || d.y < -2 || d.y > H + 2) continue;

        const dense = d.dens;
        let target = 0;
        if (d.sticky > 0) target = d.sticky;

        // Ambient scatter
        {
          const nx = (d.x / W) * 2 - 1;
          const ny = (d.y / H) * 2 - 1;
          const ar = W / H;

          const c1x =  0.70 * Math.sin(now * 0.00021);
          const c1y =  0.55 * Math.cos(now * 0.00029 + 0.6);
          const c2x = -0.75 * Math.sin(now * 0.00033 + 1.7);
          const c2y =  0.60 * Math.cos(now * 0.00025 + 2.4);
          const c3x =  0.20 * Math.sin(now * 0.00018 + 3.1);
          const c3y = -0.65 * Math.cos(now * 0.00031 + 0.9);
          const c4x = -0.45 * Math.sin(now * 0.00027 + 4.3);
          const c4y = -0.40 * Math.cos(now * 0.00023 + 2.0);

          const dx1 = (nx - c1x) * ar, dy1 = ny - c1y;
          const dx2 = (nx - c2x) * ar, dy2 = ny - c2y;
          const dx3 = (nx - c3x) * ar, dy3 = ny - c3y;
          const dx4 = (nx - c4x) * ar, dy4 = ny - c4y;

          const blob1 = 0.95 * Math.exp(-(dx1*dx1 + dy1*dy1) / 0.60);
          const blob2 = 0.80 * Math.exp(-(dx2*dx2 + dy2*dy2) / 0.85);
          const blob3 = 0.70 * Math.exp(-(dx3*dx3 + dy3*dy3) / 0.55);
          const blob4 = 0.65 * Math.exp(-(dx4*dx4 + dy4*dy4) / 0.95);

          const grain  = 0.5 + 0.5 * Math.sin(nx * 6.5 + Math.cos(ny * 5.8 + now * 0.00075) * 2.2 + now * 0.0004);
          const grain2 = 0.5 + 0.5 * Math.sin(ny * 7.2 - Math.cos(nx * 4.9 - now * 0.0006)  * 1.9 - now * 0.00055);
          const noise  = grain * grain2;
          const wide   = 0.5 + 0.5 * Math.sin(nx * 2.1 + now * 0.00018) *
                                Math.cos(ny * 1.8 - now * 0.00021);

          const ambient = ((blob1 + blob2 + blob3 + blob4) * (0.35 + 0.65 * noise) + noise * 0.18 + wide * 0.12) * AMBIENT_STRENGTH;
          const aThresh = 0.14 + (1 - dense) * 0.38;
          if (ambient > aThresh) target += (ambient - aThresh) * 1.25;
        }

        // Cursor cluster + trail
        let bloom = 0;
        const cdx = d.x - aura.x;
        const cdy = d.y - aura.y;
        const cdsq = cdx * cdx + cdy * cdy;

        if (cdsq < cullRadiusSq) {
          const halo = Math.exp(-cdsq / haloFalloffSq);
          const core = Math.exp(-cdsq / coreFalloffSq);
          bloom += halo * 0.55 + core * 1.45;
        }

        for (let ti = 0; ti < trail.length; ti++) {
          const tr  = trail[ti];
          const age = (ti + 1) / trail.length;
          const w   = (1 - age) * (1 - age);
          const tdx = d.x - tr.x;
          const tdy = d.y - tr.y;
          const tdsq = tdx * tdx + tdy * tdy;
          if (tdsq > cullRadiusSq) continue;
          const halo = Math.exp(-tdsq / (haloFalloffSq * (1 - age * 0.4)));
          const core = Math.exp(-tdsq / (coreFalloffSq * (1 - age * 0.55)));
          bloom += (halo * 0.35 + core * 0.85) * w;
        }

        bloom *= CLUSTER_STRENGTH * aura.intensity;

        // Ripples
        let rippleAdd = 0;
        for (let ri = 0; ri < liveRipples.length; ri++) {
          const r   = liveRipples[ri];
          const rdx = d.x - r.x;
          const rdy = d.y - r.y;
          const rd  = Math.sqrt(rdx * rdx + rdy * rdy);
          const off = Math.abs(rd - r.radius);
          if (off < r.thickness * 1.9) {
            rippleAdd += Math.exp(-(off * off) / (r.thickness * r.thickness * 0.6)) * r.strength;
          }
        }
        if (rippleAdd > 0) {
          const rThresh = 0.025 + (1 - dense) * 0.22;
          if (rippleAdd > rThresh) target += (rippleAdd - rThresh) * 1.8;
        }

        // Density gating
        if (bloom > 0) {
          const rd     = Math.sqrt(cdsq);
          const inCore = 1 - Math.min(1, rd / (CLUSTER_RADIUS * 1.6));
          const thresh = (0.05 + (1 - inCore) * 0.95) * (0.4 + dense * 1.2);
          if (bloom > thresh) target += (bloom - thresh) * 1.6;
        }

        // Twinkle
        target *= 0.85 + 0.15 * Math.sin(now * 0.002 * d.speed + d.phase);
        if (target > 1.5) target = 1.5;
        if (target < 0)   target = 0;

        d.target    = target;
        d.intensity += (target - d.intensity) * followStep;

        const v = d.intensity;
        if (v < 0.03) continue;

        const size = DOT_BASE + Math.min(1, v) * (DOT_MAX - DOT_BASE);
        const a    = Math.min(1, v);

        ctx.fillStyle = d.fleck
          ? `rgba(245,250,200,${(a * 0.92).toFixed(3)})`
          : `rgba(232,254,103,${a.toFixed(3)})`;
        ctx.fillRect(d.x - size * 0.5, d.y - size * 0.5, size, size);
      }
    }

    // Boot
    resize();
    window.addEventListener('resize', resize);
    animId = requestAnimationFrame(tick);

    return () => {
      cancelAnimationFrame(animId);
      window.removeEventListener('resize', resize);
      canvas.removeEventListener('pointermove',  onPointerMove);
      canvas.removeEventListener('pointerenter', onPointerEnter);
      canvas.removeEventListener('pointerleave', onPointerLeave);
      canvas.removeEventListener('pointerdown',  onPointerDown);
    };
  }, []);

  return (
    <canvas
      ref={canvasRef}
      style={{
        position: 'absolute',
        top: 0, left: 0,
        width: '100%', height: '100%',
        display: 'block',
        zIndex: 0,
        cursor: 'crosshair',
      }}
    />
  );
}

// ── Module SVG thumbnails ──────────────────────────────────────────────────

function ModuleSVGThumb({ renderSvg, hovered }) {
  const [animated, setAnimated] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setAnimated(true); obs.disconnect(); } },
      { threshold: 0.3 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return <div ref={ref} style={{ width: "100%", height: "100%", minHeight: 0 }}>{renderSvg(animated, hovered)}</div>;
}

function modShapeStyle(i, animated) {
  return animated
    ? { transformBox: "fill-box", transformOrigin: "center",
        animation: `modShapeIn 0.6s cubic-bezier(0.34,1.56,0.64,1) ${i * 60}ms both` }
    : { opacity: 0 };
}

const HOVER_DIRS = [
  { x: -0.8, y: -0.6 }, { x:  0.6, y: -0.8 }, { x:  1.0, y:  0.2 },
  { x: -0.5, y:  0.9 }, { x:  0.9, y: -0.4 }, { x: -0.7, y:  0.7 },
  { x:  0.3, y: -1.0 }, { x: -1.0, y:  0.1 }, { x:  0.5, y:  0.8 },
  { x:  0.8, y:  0.5 },
];
const HOVER_DIST = 7;

function modHoverStyle(i, hovered) {
  const dir = HOVER_DIRS[i % HOVER_DIRS.length];
  const tx = hovered ? (dir.x * HOVER_DIST).toFixed(1) : 0;
  const ty = hovered ? (dir.y * HOVER_DIST).toFixed(1) : 0;
  return {
    transform: `translate(${tx}px,${ty}px)`,
    transition: hovered
      ? `transform 0.4s cubic-bezier(0.34,1.56,0.64,1) ${i * 30}ms`
      : `transform 0.35s ease ${i * 20}ms`,
  };
}
